name: Automation worker (dispatch due messages)

# Precheck + dispatch of due automation messages (follow-up, lifecycle, review,
# referral, equity pull-ahead). Runs every 15 minutes. Scheduled workflows run in
# UTC and only from the default branch. The endpoint is idempotent — each queued
# message is claimed once — so a delayed or doubled run is harmless.
on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch: {}       # manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/automation-run
        run: |
          curl -fsS -X POST \
            "https://vehicle-marketplace-s0e4.onrender.com/cron/automation-run" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
