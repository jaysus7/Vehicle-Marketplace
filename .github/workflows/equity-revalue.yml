name: Equity revalue (lease pull-ahead)

# Weekly refresh of estimated wholesale values + estimated lease payoffs for every
# delivered/leased customer, so the Equity Radar stays current between manual edits.
# Runs Sunday 09:00 UTC. Wholesale values don't move fast, so weekly is plenty; the
# endpoint is idempotent (it just overwrites the cached estimate) and safe to re-run.
on:
  schedule:
    - cron: '0 9 * * 0'   # Sundays at 09:00 UTC
  workflow_dispatch: {}    # manual trigger from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/equity-revalue
        run: |
          curl -fsS -X POST \
            "https://vehicle-marketplace-s0e4.onrender.com/cron/equity-revalue" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}"
