<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace Lister</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    /* ── Header ── */
    .header {
      background: #1a1a1a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .header .dealer { font-size: 11px; color: #888; margin-top: 2px; }
    .logout-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .logout-btn:hover { border-color: #555; color: #fff; }

    /* ── Login Screen ── */
    #login-screen {
      padding: 24px 20px;
    }
    #login-screen h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    #login-screen p {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .form-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus { border-color: #3b82f6; }

    .btn-primary {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #1e3a5f; color: #555; cursor: not-allowed; }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }

    /* ── Inventory Screen ── */
    #inventory-screen { display: none; }

    .stats-bar {
      display: flex;
      gap: 1px;
      background: #2a2a2a;
    }
    .stat {
      flex: 1;
      background: #1a1a1a;
      padding: 10px;
      text-align: center;
    }
    .stat .num { font-size: 18px; font-weight: 700; color: #3b82f6; }
    .stat .label { font-size: 10px; color: #666; margin-top: 2px; text-transform: uppercase; }

    .toolbar {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }
    .toolbar span { font-size: 12px; color: #666; }
    .refresh-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #888;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .refresh-btn:hover { border-color: #444; color: #fff; }

    .vehicle-list {
      max-height: 380px;
      overflow-y: auto;
    }
    .vehicle-list::-webkit-scrollbar { width: 4px; }
    .vehicle-list::-webkit-scrollbar-track { background: #0f0f0f; }
    .vehicle-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .vehicle-item {
      padding: 12px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .vehicle-item:hover { background: #141414; }

    .vehicle-thumb {
      width: 52px;
      height: 38px;
      border-radius: 6px;
      object-fit: cover;
      background: #1a1a1a;
      flex-shrink: 0;
    }
    .vehicle-thumb-placeholder {
      width: 52px;
      height: 38px;
      border-radius: 6px;
      background: #1a1a1a;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .vehicle-info { flex: 1; min-width: 0; }
    .vehicle-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vehicle-sub {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    .vehicle-price {
      font-size: 12px;
      font-weight: 700;
      color: #22c55e;
    }

    .post-btn {
      background: #1a3a1a;
      border: 1px solid #22c55e;
      color: #22c55e;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .post-btn:hover { background: #22c55e; color: #000; }
    .post-btn.posted {
      background: #1a1a1a;
      border-color: #333;
      color: #555;
      cursor: not-allowed;
    }
    .post-btn.posting {
      background: #1a2a3a;
      border-color: #3b82f6;
      color: #3b82f6;
      cursor: wait;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #444;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; }
    .empty-state p { font-size: 13px; }

    .loading {
      padding: 40px 20px;
      text-align: center;
      color: #444;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen">
    <h2>Marketplace Lister</h2>
    <p>Sign in with your dealership account</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@wellandchev.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="login-btn">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>

  <!-- INVENTORY SCREEN -->
  <div id="inventory-screen">
    <div class="header">
      <div>
        <div class="header h1" id="header-name">Loading...</div>
        <div class="dealer" id="header-dealer"></div>
      </div>
      <button class="logout-btn" id="logout-btn">Sign Out</button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="num" id="stat-total">—</div>
        <div class="label">In Stock</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-posted">—</div>
        <div class="label">Posted</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-remaining">—</div>
        <div class="label">Remaining</div>
      </div>
    </div>

    <div class="toolbar">
      <span id="toolbar-label">Inventory</span>
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>

    <div class="vehicle-list" id="vehicle-list">
      <div class="loading">Loading inventory...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
