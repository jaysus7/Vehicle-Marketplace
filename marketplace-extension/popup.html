<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketSync</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    /* ── Header ── */
    .header {
      background: #1a1a1a;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .header .dealer { font-size: 11px; color: #888; margin-top: 2px; }
    .logout-btn {
      background: none;
      border: 1px solid #333;
      color: #888;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .logout-btn:hover { border-color: #555; color: #fff; }

    /* ── View Controller ── */
    .view-screen { display: none; }
    .view-screen.active { display: block; }

    /* ── Login Screen ── */
    #login-screen {
      padding: 24px 20px;
    }
    #login-screen h2, #register-screen h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    #login-screen p, #register-screen p {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .form-group input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus { border-color: #3b82f6; }

    .btn-primary {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 11px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { background: #1e3a5f; color: #555; cursor: not-allowed; }

    .error-msg {
      color: #ef4444;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }
    .success-msg {
      color: #22c55e;
      font-size: 12px;
      margin-top: 10px;
      text-align: center;
    }

    /* ── Registration Footnote Section ── */
    .register-container {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #1a1a1a;
      text-align: center;
    }
    .register-text {
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
    }
    .btn-secondary {
      background: none;
      border: 1px dashed #3a3a3a;
      color: #a3a3a3;
      font-size: 11px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover {
      border-color: #3b82f6;
      color: #3b82f6;
      background: #0b1329;
    }

    /* ── Inventory Screen ── */
    .stats-bar {
      display: flex;
      gap: 1px;
      background: #2a2a2a;
    }
    .stat {
      flex: 1;
      background: #1a1a1a;
      padding: 10px;
      text-align: center;
    }
    .stat .num { font-size: 18px; font-weight: 700; color: #3b82f6; }
    .stat .label { font-size: 10px; color: #666; margin-top: 2px; text-transform: uppercase; }

    .toolbar {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #1a1a1a;
    }
    .toolbar span { font-size: 12px; color: #666; }
    .refresh-btn {
      background: none;
      border: 1px solid #2a2a2a;
      color: #888;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .refresh-btn:hover { border-color: #444; color: #fff; }

    .vehicle-list {
      max-height: 380px;
      overflow-y: auto;
    }
    .vehicle-list::-webkit-scrollbar { width: 4px; }
    .vehicle-list::-webkit-scrollbar-track { background: #0f0f0f; }
    .vehicle-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    .vehicle-item {
      padding: 12px;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .vehicle-item:hover { background: #141414; }

    .vehicle-thumb {
      width: 52px;
      height: 38px;
      border-radius: 6px;
      object-fit: cover;
      background: #1a1a1a;
      flex-shrink: 0;
    }

    .vehicle-info { flex: 1; min-width: 0; }
    .vehicle-name {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .vehicle-sub {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }
    .vehicle-price {
      font-size: 12px;
      font-weight: 700;
      color: #22c55e;
    }

    .post-btn {
      background: #1a3a1a;
      border: 1px solid #22c55e;
      color: #22c55e;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .post-btn:hover { background: #22c55e; color: #000; }

    .loading {
      padding: 40px 20px;
      text-align: center;
      color: #444;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="login-screen" class="view-screen active">
    <h2>| MarketSync</h2>
    <p>Sign in with your dealership or personal account</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="youname@yourdealership.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" id="login-btn">Sign In</button>
    <div class="error-msg" id="login-error"></div>

    <div class="register-container">
      <div class="register-text">Start Free for 7 Days?</div>
      <button type="button" class="btn-secondary" id="go-to-register-btn">Register You or your Dealership</button>
    </div>
  </div>

  <div id="register-screen" class="view-screen">
    <h2>Create Workspace</h2>
    <p>Configure automated inventory pipeline securely</p>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-fullname" placeholder="Jane Doe" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="youremail@yourdealership.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="••••••••" />
    </div>
    <div class="form-group">
      <label>Dealership Name</label>
      <input type="text" id="reg-dealername" placeholder="Your Dealership Name" />
    </div>
    <div class="form-group">
      <label>Website URL</label>
      <input type="url" id="reg-website" placeholder="https://www.yourdealership.com" />
    </div>
    <div class="form-group">
      <label>Inventory Feed URL</label>
      <input type="url" id="reg-feed" placeholder="https://yourdealershipname.com/feed" />
    </div>
    
    <button class="btn-primary" id="submit-register-btn">Submit & Verify Email</button>
    <div class="error-msg" id="reg-error"></div>
    <div class="success-msg" id="reg-success"></div>

    <div class="register-container">
      <button type="button" class="btn-secondary" id="go-to-login-btn">← Back to Sign In</button>
    </div>
  </div>

  <div class="toolbar">
  <div class="category-filter" id="category-filter">
    <button class="cat-btn active" data-cat="all">All</button>
    <button class="cat-btn" data-cat="New">New</button>
    <button class="cat-btn" data-cat="Used">Used</button>
    <button class="cat-btn" data-cat="Demo">Demo</button>
  </div>
  <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
</div>

    <div class="stats-bar">
      <div class="stat">
        <div class="num" id="stat-total">—</div>
        <div class="label">In Stock</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-posted">—</div>
        <div class="label">Posted</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-remaining">—</div>
        <div class="label">Remaining</div>
      </div>
    </div>

    <div class="toolbar">
      <span id="toolbar-label">Inventory</span>
      <button class="refresh-btn" id="refresh-btn">↻ Refresh</button>
    </div>

    <div class="vehicle-list" id="vehicle-list">
      <div class="loading">Loading inventory...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
