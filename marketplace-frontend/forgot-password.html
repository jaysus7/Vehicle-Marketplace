<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Forgot Password · MarketSync</title>
  <style id="word-break-mobile-css">@media (max-width: 640px) { body { word-wrap: break-word; overflow-wrap: anywhere; } code { white-space: pre-wrap; word-break: break-all; } }</style>
  <script>tailwind = { config: { darkMode: 'media' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen flex items-center justify-center font-sans overflow-x-hidden">
  <div class="bg-white dark:bg-slate-900 p-8 rounded-lg border border-slate-200 dark:border-slate-800 shadow-xl w-full max-w-md mx-4">
    <div class="text-center mb-6">
      <a href="index.html" class="inline-flex items-center gap-2.5">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-sm"></span>
        <span class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
      </a>
    </div>
    <h2 class="text-lg font-bold mb-1 text-center text-slate-900 dark:text-white">Reset your password</h2>
    <p class="text-xs text-slate-500 dark:text-slate-400 text-center mb-6">We'll email you a link to set a new one.</p>

    <div id="msg" class="hidden mb-4 p-3 rounded text-xs"></div>

    <form id="forgot-form" class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">Email Address</label>
        <input type="email" id="email" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded text-sm transition">Send reset link</button>
    </form>

    <p class="text-center text-xs text-slate-500 dark:text-slate-400 mt-6">
      Remembered it? <a href="login.html" class="text-indigo-600 dark:text-indigo-400 hover:underline">Back to sign in</a>
    </p>
  </div>

  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      try {
        await fetch(`${API}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() })
        });
        msg.textContent = 'If that email exists, a reset link is on its way. Check your inbox.';
        msg.className = 'mb-4 p-3 bg-emerald-100 dark:bg-emerald-900/50 border border-emerald-300 dark:border-emerald-700 text-emerald-700 dark:text-emerald-200 text-xs rounded';
        msg.classList.remove('hidden');
        btn.textContent = 'Sent';
      } catch (err) {
        msg.textContent = 'Could not send reset link. Please try again.';
        msg.className = 'mb-4 p-3 bg-red-100 dark:bg-red-900/50 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-200 text-xs rounded';
        msg.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
