<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Group Admin — MarketSync</title>
  <script>tailwind = { config: { darkMode: 'media' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased">

  <nav class="border-b border-slate-200 dark:border-slate-800/80 sticky top-0 bg-slate-50/90 dark:bg-slate-950/90 backdrop-blur-sm z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-sm"></span>
        <span class="text-lg font-black tracking-tight">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
        <span class="ml-2 text-xs font-bold uppercase tracking-wider bg-indigo-100 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-full">Group Admin</span>
      </div>
      <a href="dashboard.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:hover:text-white transition">← Dashboard</a>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <div id="root">
      <div class="py-20 text-center text-sm text-slate-400 italic">Loading…</div>
    </div>
  </main>

  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    const token = localStorage.getItem('token');
    const root = document.getElementById('root');
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

    if (!token) { location.href = 'login.html'; }

    async function api(path, opts = {}) {
      const r = await fetch(`${API}${path}`, {
        ...opts,
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) },
      });
      return r;
    }

    const tile = (label, val, cls = '') => `
      <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-5 py-4">
        <div class="text-[11px] uppercase font-bold tracking-wider text-slate-400">${esc(label)}</div>
        <div class="text-3xl font-black mt-1 ${cls} tabular-nums">${esc(val)}</div>
      </div>`;

    const billingPill = (s) => {
      const map = { ACTIVE:'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300', TRIALING:'bg-indigo-100 text-indigo-700 dark:bg-indigo-950/50 dark:text-indigo-300' };
      const cls = map[s] || 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400';
      return `<span class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full ${cls}">${esc(s || 'inactive')}</span>`;
    };

    function renderOverview(data, downline) {
      const t = data.totals || {};
      const stores = data.stores || [];
      const dlById = Object.fromEntries((downline?.stores || []).map(s => [s.id, s.members || []]));

      const storeCards = stores.map(s => {
        const members = dlById[s.id] || [];
        const roleCount = (r) => members.filter(m => m.role === r).length;
        return `
          <div class="store-card cursor-pointer bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden hover:border-indigo-400 dark:hover:border-indigo-600 hover:shadow-md transition" data-store="${esc(s.id)}">
            <div class="px-5 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between gap-3">
              <div class="font-bold text-slate-900 dark:text-white truncate">${esc(s.name || 'Store')}</div>
              ${billingPill(s.billing_status)}
            </div>
            <div class="grid grid-cols-3 divide-x divide-slate-100 dark:divide-slate-800 text-center">
              <div class="px-3 py-4"><div class="text-2xl font-black tabular-nums">${s.reps}</div><div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mt-0.5">Reps</div></div>
              <div class="px-3 py-4"><div class="text-2xl font-black tabular-nums">${s.posted}</div><div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mt-0.5">Posted</div></div>
              <div class="px-3 py-4"><div class="text-2xl font-black tabular-nums text-emerald-600 dark:text-emerald-400">${s.sold}</div><div class="text-[10px] uppercase font-bold tracking-wider text-slate-400 mt-0.5">Sold</div></div>
            </div>
            <div class="px-5 py-3 border-t border-slate-200 dark:border-slate-800 flex items-center justify-between text-xs text-slate-500 dark:text-slate-400">
              <span>${s.listings} in stock · avg ${s.avg_days_to_sell != null ? s.avg_days_to_sell + 'd to sell' : '—'}</span>
              <span>${roleCount('MANAGER')} mgr · ${roleCount('SALES_REP')} rep</span>
            </div>
          </div>`;
      }).join('') || '<div class="col-span-full text-sm text-slate-400 italic py-8 text-center">No stores in this group yet.</div>';

      const code = data.group?.join_code;
      const inviteCard = code ? `
        <div class="mb-6 bg-indigo-50 dark:bg-indigo-950/30 border border-indigo-200 dark:border-indigo-800 rounded-xl px-5 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
          <div>
            <div class="text-xs font-bold uppercase tracking-wider text-indigo-700 dark:text-indigo-300">Invite your stores</div>
            <p class="text-sm text-slate-600 dark:text-slate-400 mt-0.5">Share this code. Each dealer opens <b>Groups → Join a group</b> and enters it — their inventory, reps and history stay exactly as they are.</p>
          </div>
          <div class="flex items-center gap-2">
            <code class="text-lg font-black tracking-widest bg-white dark:bg-slate-900 border border-indigo-200 dark:border-indigo-800 rounded-lg px-4 py-2">${esc(code)}</code>
            <button id="copy-code" class="text-xs font-bold px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white transition">Copy</button>
          </div>
        </div>` : '';

      root.innerHTML = `
        <div class="mb-6">
          <h1 class="text-2xl font-black tracking-tight">${esc(data.group?.name || 'Your Dealer Group')}</h1>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">${t.stores || 0} store${t.stores === 1 ? '' : 's'} · billing: ${esc(data.group?.billing_mode === 'group' ? 'central (group)' : 'per-dealer')}</p>
        </div>
        ${inviteCard}
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
          ${tile('Stores', t.stores || 0)}
          ${tile('Reps', t.reps || 0)}
          ${tile('Posted', t.posted || 0)}
          ${tile('Sold', t.sold || 0, 'text-emerald-600 dark:text-emerald-400')}
        </div>
        ${(() => {
          const cents = data.group?.monthly_price_cents;
          const priceStr = cents ? `$${(cents / 100).toLocaleString(undefined, { minimumFractionDigits: (cents % 100 ? 2 : 0) })}/mo` : null;
          const ownerSetter = data.is_owner ? `
            <div class="mt-3 pt-3 border-t border-slate-200 dark:border-slate-800 flex items-center gap-2">
              <span class="text-[10px] uppercase font-bold tracking-wider text-amber-600 dark:text-amber-400">Owner</span>
              <span class="text-xs text-slate-500">Group monthly price $</span>
              <input id="price-input" type="number" min="0" step="1" value="${cents ? (cents / 100) : ''}" placeholder="0" class="w-24 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded px-2 py-1 text-xs">
              <button id="price-save" class="text-xs font-bold px-3 py-1 rounded bg-slate-800 dark:bg-slate-700 text-white">Set price</button>
              <span id="price-msg" class="text-xs"></span>
            </div>` : '';
          return `
        <div class="mb-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl px-5 py-4">
          <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div>
              <div class="text-sm font-bold text-slate-900 dark:text-white">Billing: ${data.group?.billing_mode === 'group' ? 'Central (group pays)' : 'Per-dealer'}${priceStr ? ` · ${priceStr}` : ''}</div>
              <p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">${data.group?.billing_mode === 'group'
                ? 'One subscription covers every store' + (data.group?.billing_status ? ` · ${esc(data.group.billing_status)}` : '') + '. Switch back to per-dealer anytime — a store can then bill on its own.'
                : 'Each store keeps its own subscription, so one can leave without affecting the rest. Switch to central to cover them all under one bill.'}</p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
              ${data.group?.billing_mode === 'group'
                ? `<button id="bill-per-dealer" class="text-xs font-bold px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Switch to per-dealer</button>`
                : `<button id="bill-central" class="text-xs font-bold px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white transition">Bill centrally</button>`}
            </div>
          </div>
          ${ownerSetter}
          <p id="bill-msg" class="hidden text-xs mt-2"></p>
        </div>`;
        })()}
        <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-3">Stores</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">${storeCards}</div>`;

      const copyBtn = document.getElementById('copy-code');
      if (copyBtn && code) copyBtn.addEventListener('click', () => {
        navigator.clipboard?.writeText(code).then(() => { copyBtn.textContent = 'Copied!'; setTimeout(() => copyBtn.textContent = 'Copy', 1500); }).catch(() => {});
      });
      document.querySelectorAll('.store-card').forEach(c => c.addEventListener('click', () => openStore(c.dataset.store)));

      const priceSave = document.getElementById('price-save');
      if (priceSave) priceSave.addEventListener('click', async () => {
        const val = document.getElementById('price-input').value;
        const pm = document.getElementById('price-msg');
        priceSave.disabled = true;
        try {
          const r = await api(`/groups/${data.group.id}/price`, { method: 'PATCH', body: JSON.stringify({ monthly_price: Number(val) }) });
          if (!r.ok) throw new Error((await r.json()).error || 'Failed');
          pm.textContent = 'Saved'; pm.className = 'text-xs text-emerald-600 dark:text-emerald-400';
          setTimeout(load, 700);
        } catch (e) { pm.textContent = e.message; pm.className = 'text-xs text-red-500'; priceSave.disabled = false; }
      });

      const billMsg = document.getElementById('bill-msg');
      document.getElementById('bill-central')?.addEventListener('click', async () => {
        try {
          const r = await api('/groups/billing/checkout', { method: 'POST' });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Failed');
          window.location.href = d.url;
        } catch (e) { billMsg.textContent = e.message; billMsg.className = 'text-xs mt-2 text-red-500'; billMsg.classList.remove('hidden'); }
      });
      document.getElementById('bill-per-dealer')?.addEventListener('click', async () => {
        if (!confirm('Switch to per-dealer billing? Each store will need its own active subscription.')) return;
        try {
          const r = await api('/groups/billing-mode', { method: 'PATCH', body: JSON.stringify({ mode: 'per_dealer' }) });
          if (!r.ok) throw new Error((await r.json()).error || 'Failed');
          load();
        } catch (e) { billMsg.textContent = e.message; billMsg.className = 'text-xs mt-2 text-red-500'; billMsg.classList.remove('hidden'); }
      });
    }

    const fmtDate = (d) => { try { return new Date(d).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }); } catch { return ''; } };

    async function openStore(storeId) {
      root.innerHTML = '<div class="py-20 text-center text-sm text-slate-400 italic">Loading store…</div>';
      let d;
      try {
        const r = await api(`/groups/stores/${storeId}`);
        if (!r.ok) throw new Error('Could not load store');
        d = await r.json();
      } catch (e) { root.innerHTML = `<div class="py-20 text-center text-sm text-slate-500">${esc(e.message)}</div>`; return; }

      const c = d.counts || {};
      const statusPill = (s) => {
        const m = { posted:'bg-indigo-100 text-indigo-700 dark:bg-indigo-950/50 dark:text-indigo-300', sold:'bg-emerald-100 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300', deleted:'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400' };
        return `<span class="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded ${m[s] || 'bg-slate-100 text-slate-500 dark:bg-slate-800 dark:text-slate-400'}">${esc(s)}</span>`;
      };
      const team = (d.team || []).map(m => `<div class="flex items-center justify-between py-2 text-sm"><span class="text-slate-700 dark:text-slate-200">${esc(m.name)}</span><span class="text-[10px] font-bold uppercase px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400">${esc(m.role)}</span></div>`).join('') || '<div class="text-sm text-slate-400 italic py-2">No team members.</div>';
      const listings = (d.recent_listings || []).map(l => `<div class="flex items-center justify-between py-2 text-sm gap-3"><span class="text-slate-700 dark:text-slate-200 truncate">${esc(l.label)}</span><span class="flex items-center gap-2 flex-shrink-0">${statusPill(l.status)}<span class="text-xs text-slate-400">${l.posted_at ? fmtDate(l.posted_at) : ''}</span></span></div>`).join('') || '<div class="text-sm text-slate-400 italic py-2">No listings yet.</div>';

      root.innerHTML = `
        <button id="back-btn" class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:hover:text-white transition mb-4">← All stores</button>
        <div class="flex items-center gap-3 mb-6"><h1 class="text-2xl font-black tracking-tight">${esc(d.store.name)}</h1>${billingPill(d.store.billing_status)}</div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
          ${tile('In stock', c.available || 0)}
          ${tile('Posted', d.posted || 0)}
          ${tile('Sold', c.sold || 0, 'text-emerald-600 dark:text-emerald-400')}
          ${tile('Avg days to sell', d.avg_days_to_sell != null ? d.avg_days_to_sell : '—')}
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-2">Team (${(d.team || []).length})</h2>
            <div class="divide-y divide-slate-100 dark:divide-slate-800">${team}</div>
          </div>
          <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5">
            <h2 class="text-sm font-bold uppercase tracking-wider text-slate-400 mb-2">Recent listings</h2>
            <div class="divide-y divide-slate-100 dark:divide-slate-800">${listings}</div>
          </div>
        </div>`;
      document.getElementById('back-btn').addEventListener('click', load);
    }

    function renderCreate() {
      root.innerHTML = `
        <div class="max-w-md mx-auto mt-10 space-y-5">
          <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
            <h1 class="text-xl font-black tracking-tight mb-1">Join a dealer group</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Already have a group code from your group HQ? Enter it — <b>your inventory, reps and history all stay exactly as they are.</b></p>
            <label class="block text-xs uppercase font-bold tracking-wider text-slate-400 mb-1.5">Group code</label>
            <div class="flex gap-2">
              <input id="join-code" placeholder="e.g. K7P4-9QMX" class="flex-1 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm uppercase tracking-widest font-mono focus:outline-none focus:ring-2 focus:ring-indigo-500">
              <button id="join-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-4 py-2 rounded-lg transition text-sm whitespace-nowrap">Join</button>
            </div>
            <p id="join-msg" class="hidden text-xs mt-2"></p>
          </div>

          <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6">
            <h1 class="text-xl font-black tracking-tight mb-1">Or create your own group</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Rollup visibility across every store — reps, posted, sold, and avg days to sell. Your current dealership is added automatically; invite the rest with a code.</p>
            <label class="block text-xs uppercase font-bold tracking-wider text-slate-400 mb-1.5">Group name</label>
            <input id="grp-name" placeholder="e.g. Prairie Auto Group" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="grp-create" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-2.5 rounded-lg transition text-sm">Create group</button>
            <p id="grp-err" class="hidden text-xs text-red-500 mt-2"></p>
          </div>
        </div>`;

      document.getElementById('join-btn').addEventListener('click', async () => {
        const code = document.getElementById('join-code').value.trim();
        const msg = document.getElementById('join-msg');
        if (!code) { msg.textContent = 'Enter the code your group shared.'; msg.className = 'text-xs mt-2 text-red-500'; msg.classList.remove('hidden'); return; }
        const btn = document.getElementById('join-btn');
        btn.disabled = true; btn.textContent = 'Joining…';
        try {
          const r = await api('/groups/join', { method: 'POST', body: JSON.stringify({ code }) });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Failed');
          msg.textContent = `Joined ${d.group?.name || 'the group'}. Your data is untouched.`;
          msg.className = 'text-xs mt-2 text-emerald-600 dark:text-emerald-400';
          msg.classList.remove('hidden');
        } catch (e) {
          msg.textContent = e.message; msg.className = 'text-xs mt-2 text-red-500'; msg.classList.remove('hidden');
          btn.disabled = false; btn.textContent = 'Join';
        }
      });

      document.getElementById('grp-create').addEventListener('click', async () => {
        const name = document.getElementById('grp-name').value.trim();
        const err = document.getElementById('grp-err');
        if (!name) { err.textContent = 'Please enter a name.'; err.classList.remove('hidden'); return; }
        const btn = document.getElementById('grp-create');
        btn.disabled = true; btn.textContent = 'Creating…';
        try {
          const r = await api('/groups', { method: 'POST', body: JSON.stringify({ name }) });
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Failed');
          load();
        } catch (e) {
          err.textContent = e.message; err.classList.remove('hidden');
          btn.disabled = false; btn.textContent = 'Create group';
        }
      });
    }

    async function load() {
      try {
        const r = await api('/groups/overview');
        if (r.status === 403) { renderCreate(); return; }
        if (!r.ok) throw new Error('Could not load group');
        const data = await r.json();
        let downline = null;
        try { const dr = await api('/groups/downline'); if (dr.ok) downline = await dr.json(); } catch {}
        renderOverview(data, downline);
      } catch (e) {
        root.innerHTML = `<div class="py-20 text-center text-sm text-slate-500">${esc(e.message)}</div>`;
      }
    }

    // Returning from group-billing checkout — clean the URL, then show the (now
    // updated) group. The webhook has already flipped billing_status.
    if (new URLSearchParams(location.search).get('group_session')) {
      history.replaceState({}, '', location.pathname);
    }

    load();
  </script>
</body>
</html>
