<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Sign In · MarketSync</title>
  <style id="word-break-mobile-css">@media (max-width: 640px) { body { word-wrap: break-word; overflow-wrap: anywhere; } code { white-space: pre-wrap; word-break: break-all; } }</style>
  <script>tailwind = { config: { darkMode: 'media' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen flex items-center justify-center font-sans overflow-x-hidden">
  <div class="bg-white dark:bg-slate-900 p-8 rounded-lg border border-slate-200 dark:border-slate-800 shadow-xl w-full max-w-md mx-4">
    <div class="text-center mb-8">
      <a href="index.html" class="inline-flex items-center gap-2.5">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-sm"></span>
        <span class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
      </a>
      <p class="text-slate-500 dark:text-slate-400 text-xs mt-2">Sign in to access your dashboard</p>
    </div>

    <div id="error-box" class="hidden mb-4 p-3 bg-red-100 dark:bg-red-900/50 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-200 text-xs rounded"></div>

    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">Professional Email</label>
        <input type="email" id="email" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <div class="flex justify-between items-center mb-1">
          <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400">Password</label>
          <a href="forgot-password.html" class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline">Forgot?</a>
        </div>
        <input type="password" id="password" required class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2.5 rounded text-sm shadow transition">Sign In to Dashboard</button>
    </form>

    <p class="text-center text-xs text-slate-500 dark:text-slate-400 mt-6">New location? <a href="register.html" class="text-indigo-600 dark:text-indigo-400 hover:underline">Register Dealership</a></p>
  </div>

  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errBox = document.getElementById('error-box');
      btn.disabled = true; btn.textContent = 'Verifying identity...';
      errBox.classList.add('hidden');

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'Identity rejection');

        localStorage.setItem('token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errBox.textContent = err.message;
        errBox.classList.remove('hidden');
        btn.disabled = false; btn.textContent = 'Sign In to Dashboard';
      }
    });
  </script>
</body>
</html>
