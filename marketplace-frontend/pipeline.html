<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Pipeline — MarketSync</title>
  <script>tailwind = { config: { darkMode: 'media' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased">

  <nav class="border-b border-slate-200 dark:border-slate-800/80 sticky top-0 bg-slate-50/90 dark:bg-slate-950/90 backdrop-blur-sm z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-sm"></span>
        <span class="text-lg font-black tracking-tight">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
        <span class="ml-2 text-xs font-bold uppercase tracking-wider bg-indigo-100 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-full">Pipeline</span>
      </div>
      <a href="dashboard.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:hover:text-white transition">← Dashboard</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="root"><div class="py-20 text-center text-sm text-slate-400 italic">Loading pipeline…</div></div>
  </main>

  <!-- Appointment modal -->
  <div id="appt-modal" class="hidden fixed inset-0 z-50 bg-black/60 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl w-full max-w-sm p-6">
      <h3 class="text-base font-bold mb-1">Set appointment</h3>
      <p id="appt-veh" class="text-xs text-slate-500 dark:text-slate-400 mb-4"></p>
      <label class="block text-xs uppercase font-bold tracking-wider text-slate-400 mb-1.5">Date &amp; time</label>
      <input id="appt-dt" type="datetime-local" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm mb-3">
      <label class="block text-xs uppercase font-bold tracking-wider text-slate-400 mb-1.5">Note (optional)</label>
      <input id="appt-note" placeholder="Buyer name, phone…" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 text-sm mb-4">
      <div class="flex justify-end gap-2">
        <button id="appt-cancel" class="text-sm font-bold px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Cancel</button>
        <button id="appt-save" class="text-sm font-bold px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white transition">Save</button>
      </div>
      <p id="appt-err" class="hidden text-xs text-red-500 mt-2"></p>
    </div>
  </div>

  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    const token = localStorage.getItem('token');
    const root = document.getElementById('root');
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    const fmtDate = (d) => { try { const days = Math.floor((Date.now() - new Date(d)) / 86400000); return days <= 0 ? 'today' : days + 'd ago'; } catch { return ''; } };
    const fmtAppt = (d) => { try { return new Date(d).toLocaleString(undefined, { weekday: 'short', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' }); } catch { return ''; } };
    if (!token) location.href = 'login.html';

    // Appointment modal — resolves with { at, note } or null.
    function askAppointment(label, existingAt, existingNote) {
      return new Promise(resolve => {
        const modal = document.getElementById('appt-modal');
        const dt = document.getElementById('appt-dt');
        const note = document.getElementById('appt-note');
        const err = document.getElementById('appt-err');
        document.getElementById('appt-veh').textContent = label || '';
        err.classList.add('hidden');
        // Prefill (convert ISO → local datetime-local value).
        if (existingAt) { const d = new Date(existingAt); const off = d.getTimezoneOffset(); dt.value = new Date(d.getTime() - off * 60000).toISOString().slice(0, 16); }
        else { const d = new Date(Date.now() + 3600000); const off = d.getTimezoneOffset(); dt.value = new Date(d.getTime() - off * 60000).toISOString().slice(0, 16); }
        note.value = existingNote || '';
        modal.classList.remove('hidden');
        const close = (val) => { modal.classList.add('hidden'); document.getElementById('appt-save').onclick = null; document.getElementById('appt-cancel').onclick = null; resolve(val); };
        document.getElementById('appt-cancel').onclick = () => close(null);
        document.getElementById('appt-save').onclick = () => {
          if (!dt.value) { err.textContent = 'Pick a date and time.'; err.classList.remove('hidden'); return; }
          close({ at: new Date(dt.value).toISOString(), note: note.value.trim() });
        };
      });
    }

    const COLS = [
      { key: 'posted',          label: 'Posted',          dot: 'bg-blue-500' },
      { key: 'appointment_set', label: 'Appointment Set', dot: 'bg-indigo-500' },
      { key: 'claimed_sale',    label: 'Claimed Sales',   dot: 'bg-emerald-500' },
      { key: 'need_relisting',  label: 'Need Relisting',  dot: 'bg-amber-500' },
    ];
    // Which stages a card can move to (all except its own).
    const MOVE_LABEL = { posted: 'Posted', appointment_set: 'Appointment Set', claimed_sale: 'Mark Sold', need_relisting: 'Need Relisting' };

    async function api(path, opts = {}) {
      return fetch(`${API}${path}`, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) } });
    }

    let DATA = { columns: {}, counts: {} };

    const money = (n) => n != null ? '$' + Number(n).toLocaleString() : '';
    const km = (n) => n != null ? Number(n).toLocaleString() + ' km' : '';

    function card(c) {
      const others = COLS.map(x => x.key).filter(k => k !== c.stage);
      const opts = others.map(k => `<option value="${k}">${MOVE_LABEL[k]}</option>`).join('');
      const rep = c.rep ? ` · ${esc(c.rep)}` : '';
      const link = c.fb_listing_url ? `<a href="${esc(c.fb_listing_url)}" target="_blank" rel="noopener" class="text-indigo-500 hover:text-indigo-400 flex-shrink-0" title="Open on Facebook">↗</a>` : '';
      const sub = [c.trim, c.exterior_color].filter(Boolean).join(' · ');
      const meta = [c.stocknumber ? '#' + esc(c.stocknumber) : '', c.mileage ? km(c.mileage) : ''].filter(Boolean).join(' · ');
      const thumb = c.image
        ? `<img src="${esc(c.image)}" alt="" loading="lazy" class="w-full h-24 object-cover rounded-md bg-slate-100 dark:bg-slate-800">`
        : `<div class="w-full h-24 rounded-md bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-300 text-2xl">🚗</div>`;
      // Green "Posted" tag, like the VIN-decode "posted" highlight.
      const postedTag = `<span class="text-[10px] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700 dark:bg-emerald-950/50 dark:text-emerald-300">Posted</span>`;
      return `
        <div class="pl-card group bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-3 cursor-grab active:cursor-grabbing" draggable="true" data-card-id="${c.id}" data-card-label="${esc(c.label)}" data-card-stage="${c.stage}">
          ${thumb}
          <div class="flex items-start justify-between gap-2 mt-2">
            <div class="min-w-0">
              <div class="text-sm font-bold text-slate-900 dark:text-white leading-snug truncate">${esc(c.label)}</div>
              ${sub ? `<div class="text-[11px] text-slate-500 dark:text-slate-400 truncate">${esc(sub)}</div>` : ''}
            </div>
            ${link}
          </div>
          <div class="flex items-center justify-between gap-2 mt-1.5">
            ${postedTag}
            ${c.price ? `<span class="text-sm font-black text-slate-900 dark:text-white">${money(c.price)}</span>` : ''}
          </div>
          ${meta ? `<div class="text-[11px] text-slate-400 mt-1">${meta}</div>` : ''}
          <div class="text-[11px] text-slate-400 mt-0.5">${c.posted_at ? 'Posted ' + fmtDate(c.posted_at) : ''}${rep}</div>
          ${c.stage === 'appointment_set' && c.appointment_at ? `
            <div class="mt-2 flex items-center justify-between gap-2 text-xs bg-indigo-50 dark:bg-indigo-950/40 border border-indigo-200 dark:border-indigo-800 rounded px-2 py-1.5">
              <span class="font-semibold text-indigo-700 dark:text-indigo-300">📅 ${esc(fmtAppt(c.appointment_at))}</span>
              <button data-appt-edit="${c.id}" data-label="${esc(c.label)}" data-at="${esc(c.appointment_at)}" data-note="${esc(c.appointment_note || '')}" class="text-indigo-500 hover:text-indigo-400 font-bold">Edit</button>
            </div>${c.appointment_note ? `<div class="text-[11px] text-slate-400 mt-1">${esc(c.appointment_note)}</div>` : ''}` : ''}
          ${c.stage === 'need_relisting' ? `<button data-relist="${c.id}" class="mt-2 w-full text-xs font-bold bg-amber-500 hover:bg-amber-400 text-white rounded px-2 py-1.5 transition">↻ Relist on Facebook</button>` : ''}
          <select data-move="${c.id}" class="mt-2 w-full text-xs bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded px-2 py-1 text-slate-600 dark:text-slate-300">
            <option value="">Move to…</option>${opts}
          </select>
        </div>`;
    }

    // Apply a stage change (shared by the dropdown + drag-drop). Handles the
    // appointment prompt when moving into Appointment Set.
    async function moveCard(id, stage, label) {
      const body = { stage };
      if (stage === 'appointment_set') {
        const appt = await askAppointment(label, null, null);
        if (!appt) return false;
        body.appointment_at = appt.at; body.appointment_note = appt.note;
      }
      const r = await api(`/pipeline/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
      if (!r.ok) throw new Error((await r.json()).error || 'Failed');
      return true;
    }

    function render() {
      const cols = COLS.map(col => {
        const cards = (DATA.columns[col.key] || []);
        const body = cards.length ? cards.map(card).join('') : '<div class="text-xs text-slate-400 italic py-6 text-center">Nothing here</div>';
        return `
          <div class="flex flex-col min-w-0">
            <div class="flex items-center justify-between mb-3 px-1">
              <div class="flex items-center gap-2 text-sm font-bold text-slate-700 dark:text-slate-200"><span class="w-2 h-2 rounded-full ${col.dot}"></span>${col.label}</div>
              <span class="text-xs font-bold text-slate-400 bg-slate-100 dark:bg-slate-800 rounded-full px-2 py-0.5">${DATA.counts[col.key] || 0}</span>
            </div>
            <div class="pl-dropzone space-y-2.5 flex-1 rounded-lg p-1 -m-1 transition" data-col="${col.key}">${body}</div>
          </div>`;
      }).join('');

      root.innerHTML = `
        <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
          <div>
            <h1 class="text-2xl font-black tracking-tight">Sales Pipeline</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">${DATA.can_manage_all ? 'Every posting across your store' : 'Your postings'} — move each one as the deal progresses.</p>
          </div>
          <button id="refresh" class="text-sm font-bold px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Refresh</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">${cols}</div>`;

      document.getElementById('refresh').addEventListener('click', load);
      document.querySelectorAll('[data-relist]').forEach(btn => btn.addEventListener('click', async () => {
        btn.disabled = true; btn.textContent = 'Relisting…';
        try {
          const r = await api(`/pipeline/${btn.dataset.relist}/relist`, { method: 'POST' });
          if (!r.ok) throw new Error((await r.json()).error || 'Failed');
          // Open Facebook Marketplace so the extension can repost the vehicle.
          window.open('https://www.facebook.com/marketplace/create/vehicle', '_blank', 'noopener');
          await load();
        } catch (e) { alert(e.message); btn.disabled = false; btn.textContent = '↻ Relist on Facebook'; }
      }));

      document.querySelectorAll('[data-appt-edit]').forEach(btn => btn.addEventListener('click', async () => {
        const appt = await askAppointment(btn.dataset.label, btn.dataset.at, btn.dataset.note);
        if (!appt) return;
        try {
          const r = await api(`/pipeline/${btn.dataset.apptEdit}`, { method: 'PATCH', body: JSON.stringify({ stage: 'appointment_set', appointment_at: appt.at, appointment_note: appt.note }) });
          if (!r.ok) throw new Error((await r.json()).error || 'Failed');
          await load();
        } catch (e) { alert(e.message); }
      }));

      document.querySelectorAll('[data-move]').forEach(sel => sel.addEventListener('change', async () => {
        const stage = sel.value; if (!stage) return;
        const label = sel.closest('[data-card-label]')?.dataset.cardLabel;
        sel.disabled = true;
        try {
          const ok = await moveCard(sel.dataset.move, stage, label);
          if (ok) await load(); else { sel.disabled = false; sel.value = ''; }
        } catch (e) { alert(e.message); sel.disabled = false; sel.value = ''; }
      }));

      // ── Drag and drop between columns ──
      let dragId = null, dragStage = null, dragLabel = null;
      document.querySelectorAll('.pl-card').forEach(el => {
        el.addEventListener('dragstart', e => {
          dragId = el.dataset.cardId; dragStage = el.dataset.cardStage; dragLabel = el.dataset.cardLabel;
          el.classList.add('opacity-40');
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => el.classList.remove('opacity-40'));
      });
      document.querySelectorAll('.pl-dropzone').forEach(zone => {
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('bg-indigo-50', 'dark:bg-indigo-950/30'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('bg-indigo-50', 'dark:bg-indigo-950/30'));
        zone.addEventListener('drop', async e => {
          e.preventDefault();
          zone.classList.remove('bg-indigo-50', 'dark:bg-indigo-950/30');
          const target = zone.dataset.col;
          if (!dragId || target === dragStage) return;
          try {
            const ok = await moveCard(dragId, target, dragLabel);
            if (ok) await load();
          } catch (err) { alert(err.message); }
        });
      });
    }

    async function load() {
      try {
        const r = await api('/pipeline');
        if (!r.ok) throw new Error('Could not load pipeline');
        DATA = await r.json();
        render();
      } catch (e) { root.innerHTML = `<div class="py-20 text-center text-sm text-slate-500">${esc(e.message)}</div>`; }
    }
    load();
  </script>
</body>
</html>
