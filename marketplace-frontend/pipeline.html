<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Pipeline — MarketSync</title>
  <script>tailwind = { config: { darkMode: 'media' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased">

  <nav class="border-b border-slate-200 dark:border-slate-800/80 sticky top-0 bg-slate-50/90 dark:bg-slate-950/90 backdrop-blur-sm z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-sm"></span>
        <span class="text-lg font-black tracking-tight">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
        <span class="ml-2 text-xs font-bold uppercase tracking-wider bg-indigo-100 dark:bg-indigo-950/50 text-indigo-700 dark:text-indigo-300 px-2 py-0.5 rounded-full">Pipeline</span>
      </div>
      <a href="dashboard.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:hover:text-white transition">← Dashboard</a>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-6 py-8">
    <div id="root"><div class="py-20 text-center text-sm text-slate-400 italic">Loading pipeline…</div></div>
  </main>

  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    const token = localStorage.getItem('token');
    const root = document.getElementById('root');
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    const fmtDate = (d) => { try { const days = Math.floor((Date.now() - new Date(d)) / 86400000); return days <= 0 ? 'today' : days + 'd ago'; } catch { return ''; } };
    if (!token) location.href = 'login.html';

    const COLS = [
      { key: 'posted',          label: 'Posted',          dot: 'bg-blue-500' },
      { key: 'appointment_set', label: 'Appointment Set', dot: 'bg-indigo-500' },
      { key: 'claimed_sale',    label: 'Claimed Sales',   dot: 'bg-emerald-500' },
      { key: 'need_relisting',  label: 'Need Relisting',  dot: 'bg-amber-500' },
    ];
    // Which stages a card can move to (all except its own).
    const MOVE_LABEL = { posted: 'Posted', appointment_set: 'Appointment Set', claimed_sale: 'Mark Sold', need_relisting: 'Need Relisting' };

    async function api(path, opts = {}) {
      return fetch(`${API}${path}`, { ...opts, headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...(opts.headers || {}) } });
    }

    let DATA = { columns: {}, counts: {} };

    function card(c) {
      const others = COLS.map(x => x.key).filter(k => k !== c.stage);
      const opts = others.map(k => `<option value="${k}">${MOVE_LABEL[k]}</option>`).join('');
      const rep = c.rep ? `<span class="text-slate-400">· ${esc(c.rep)}</span>` : '';
      const link = c.fb_listing_url ? `<a href="${esc(c.fb_listing_url)}" target="_blank" rel="noopener" class="text-indigo-500 hover:text-indigo-400" title="Open on Facebook">↗</a>` : '';
      return `
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg p-3">
          <div class="flex items-start justify-between gap-2">
            <div class="text-sm font-semibold text-slate-900 dark:text-white leading-snug">${esc(c.label)}</div>
            ${link}
          </div>
          <div class="text-[11px] text-slate-400 mt-1">${c.posted_at ? 'Posted ' + fmtDate(c.posted_at) : ''} ${rep}</div>
          ${c.stage === 'need_relisting' ? `<button data-relist="${c.id}" class="mt-2 w-full text-xs font-bold bg-amber-500 hover:bg-amber-400 text-white rounded px-2 py-1.5 transition">↻ Relist on Facebook</button>` : ''}
          <select data-move="${c.id}" class="mt-2 w-full text-xs bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-700 rounded px-2 py-1 text-slate-600 dark:text-slate-300">
            <option value="">Move to…</option>${opts}
          </select>
        </div>`;
    }

    function render() {
      const cols = COLS.map(col => {
        const cards = (DATA.columns[col.key] || []);
        const body = cards.length ? cards.map(card).join('') : '<div class="text-xs text-slate-400 italic py-6 text-center">Nothing here</div>';
        return `
          <div class="flex flex-col min-w-0">
            <div class="flex items-center justify-between mb-3 px-1">
              <div class="flex items-center gap-2 text-sm font-bold text-slate-700 dark:text-slate-200"><span class="w-2 h-2 rounded-full ${col.dot}"></span>${col.label}</div>
              <span class="text-xs font-bold text-slate-400 bg-slate-100 dark:bg-slate-800 rounded-full px-2 py-0.5">${DATA.counts[col.key] || 0}</span>
            </div>
            <div class="space-y-2.5 flex-1">${body}</div>
          </div>`;
      }).join('');

      root.innerHTML = `
        <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
          <div>
            <h1 class="text-2xl font-black tracking-tight">Sales Pipeline</h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">${DATA.can_manage_all ? 'Every posting across your store' : 'Your postings'} — move each one as the deal progresses.</p>
          </div>
          <button id="refresh" class="text-sm font-bold px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">Refresh</button>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-5">${cols}</div>`;

      document.getElementById('refresh').addEventListener('click', load);
      document.querySelectorAll('[data-relist]').forEach(btn => btn.addEventListener('click', async () => {
        btn.disabled = true; btn.textContent = 'Relisting…';
        try {
          const r = await api(`/pipeline/${btn.dataset.relist}/relist`, { method: 'POST' });
          if (!r.ok) throw new Error((await r.json()).error || 'Failed');
          // Open Facebook Marketplace so the extension can repost the vehicle.
          window.open('https://www.facebook.com/marketplace/create/vehicle', '_blank', 'noopener');
          await load();
        } catch (e) { alert(e.message); btn.disabled = false; btn.textContent = '↻ Relist on Facebook'; }
      }));

      document.querySelectorAll('[data-move]').forEach(sel => sel.addEventListener('change', async () => {
        const stage = sel.value; if (!stage) return;
        sel.disabled = true;
        try {
          const r = await api(`/pipeline/${sel.dataset.move}`, { method: 'PATCH', body: JSON.stringify({ stage }) });
          if (!r.ok) throw new Error((await r.json()).error || 'Failed');
          await load();
        } catch (e) { alert(e.message); sel.disabled = false; sel.value = ''; }
      }));
    }

    async function load() {
      try {
        const r = await api('/pipeline');
        if (!r.ok) throw new Error('Could not load pipeline');
        DATA = await r.json();
        render();
      } catch (e) { root.innerHTML = `<div class="py-20 text-center text-sm text-slate-500">${esc(e.message)}</div>`; }
    }
    load();
  </script>
</body>
</html>
