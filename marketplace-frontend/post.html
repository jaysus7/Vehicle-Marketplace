<!DOCTYPE html>
<html lang="en">
<head>

<script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/4313ff69152b93899edaa7a8/script.js"></script>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarketSync Blog</title>
  <meta name="description" content="MarketSync blog post.">
  <script>tailwind = { config: { darkMode: 'media' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
  <style>
    .article h2 { font-size: 1.6rem; font-weight: 800; margin: 2rem 0 .75rem; line-height: 1.25; }
    .article h3 { font-size: 1.25rem; font-weight: 700; margin: 1.5rem 0 .5rem; }
    .article p { margin: 0 0 1.1rem; line-height: 1.75; }
    .article ul, .article ol { margin: 0 0 1.1rem 1.25rem; line-height: 1.75; }
    .article ul { list-style: disc; } .article ol { list-style: decimal; }
    .article li { margin: .35rem 0; }
    .article a { color: #6366f1; text-decoration: underline; }
    .article img { border-radius: .75rem; margin: 1.5rem 0; max-width: 100%; height: auto; }
    .article blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; margin: 1.25rem 0; font-style: italic; color: #64748b; }
    .article pre { background: rgba(100,116,139,.12); padding: 1rem; border-radius: .5rem; overflow-x: auto; margin: 0 0 1.1rem; font-size: .85rem; }
    .article code { background: rgba(100,116,139,.15); padding: .15rem .4rem; border-radius: .3rem; font-size: .85em; }
    .article pre code { background: none; padding: 0; }
    .article h2:first-child, .article p:first-child { margin-top: 0; }
  </style>
  <style id="ms-font-bump">html{font-size:17px}@media (max-width:640px){html{font-size:16px}}</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased overflow-x-hidden">

  <nav class="border-b border-slate-200 dark:border-slate-800/80 backdrop-blur-sm sticky top-0 bg-slate-50/80 dark:bg-slate-950/80 z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2.5">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-sm"></span>
        <span class="text-xl font-black tracking-tight text-slate-900 dark:text-white">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
      </a>
      <a href="blog.html" class="text-sm font-medium text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition">← All posts</a>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 pt-12 pb-24">
    <article id="article">
      <div class="text-sm text-slate-500 italic py-16 text-center">Loading…</div>
    </article>

    <div class="mt-14 pt-8 border-t border-slate-200 dark:border-slate-800 text-center">
      <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Post your inventory to Facebook in seconds</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">MarketSync auto-fills every Marketplace listing for you. Free 7-day trial.</p>
      <a href="register.html" class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-6 py-3 rounded-xl transition">Start free trial</a>
    </div>
  </main>

  <footer class="border-t border-slate-200 dark:border-slate-800/60 py-8">
    <div class="max-w-5xl mx-auto px-6 flex flex-col sm:flex-row justify-between items-center gap-4">
      <div class="flex items-center gap-2.5">
        <span class="w-1.5 h-5 bg-indigo-500 rounded-sm"></span>
        <span class="text-sm font-bold tracking-tight text-slate-900 dark:text-white">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
      </div>
      <div class="text-xs text-slate-500">&copy; 2026 MarketSync · Not affiliated with Meta or Facebook</div>
    </div>
  </footer>

  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    const fmtDate = (d) => { try { return new Date(d).toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' }); } catch { return ''; } };
    // Basic sanitize: strip <script>/<style> blocks and inline event handlers.
    const sanitize = (html) => String(html || '')
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/<style[\s\S]*?<\/style>/gi, '')
      .replace(/\son\w+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, '')
      .replace(/javascript:/gi, '');

    function setMeta(name, content, attr = 'name') {
      let el = document.head.querySelector(`meta[${attr}="${name}"]`);
      if (!el) { el = document.createElement('meta'); el.setAttribute(attr, name); document.head.appendChild(el); }
      el.setAttribute('content', content);
    }
    function setCanonical(url) {
      let el = document.head.querySelector('link[rel="canonical"]');
      if (!el) { el = document.createElement('link'); el.rel = 'canonical'; document.head.appendChild(el); }
      el.href = url;
    }

    (async function () {
      const art = document.getElementById('article');
      const slug = new URLSearchParams(location.search).get('slug');
      if (!slug) { art.innerHTML = errBlock('No post specified.'); return; }

      let p;
      try {
        const r = await fetch(`${API}/blog/${encodeURIComponent(slug)}`);
        if (!r.ok) throw new Error('not found');
        p = await r.json();
      } catch {
        art.innerHTML = errBlock("This post doesn't exist or was removed.");
        document.title = 'Post not found — MarketSync';
        return;
      }

      const url = `https://marketsync.link/post.html?slug=${encodeURIComponent(p.slug)}`;
      const desc = (p.excerpt || '').slice(0, 200);
      document.title = `${p.title} — MarketSync`;
      setMeta('description', desc);
      setCanonical(url);
      setMeta('og:title', p.title, 'property');
      setMeta('og:description', desc, 'property');
      setMeta('og:type', 'article', 'property');
      setMeta('og:url', url, 'property');
      if (p.cover_image_url) setMeta('og:image', p.cover_image_url, 'property');
      setMeta('twitter:card', p.cover_image_url ? 'summary_large_image' : 'summary');

      // JSON-LD BlogPosting for rich results.
      const ld = document.createElement('script');
      ld.type = 'application/ld+json';
      ld.textContent = JSON.stringify({
        '@context': 'https://schema.org', '@type': 'BlogPosting',
        headline: p.title, description: desc,
        image: p.cover_image_url || undefined,
        datePublished: p.published_at, dateModified: p.updated_at || p.published_at,
        author: { '@type': 'Organization', name: p.author || 'MarketSync' },
        publisher: { '@type': 'Organization', name: 'MarketSync', logo: { '@type': 'ImageObject', url: 'https://marketsync.link/logo.png' } },
        mainEntityOfPage: url
      });
      document.head.appendChild(ld);

      const tags = (p.tags || []).map(t => `<span class="text-[10px] uppercase font-bold tracking-wider text-indigo-600 dark:text-indigo-400">${esc(t)}</span>`).join(' · ');
      const cover = p.cover_image_url ? `<img src="${esc(p.cover_image_url)}" alt="${esc(p.title)}" class="w-full rounded-xl mb-8">` : '';
      art.innerHTML = `
        <div class="flex items-center gap-2 mb-3 flex-wrap">${tags}${tags ? '<span class="text-slate-300 dark:text-slate-700">·</span>' : ''}<span class="text-xs text-slate-400">${fmtDate(p.published_at)} · ${esc(p.author || 'MarketSync')}</span></div>
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-slate-900 dark:text-white mb-6 leading-tight">${esc(p.title)}</h1>
        ${cover}
        <div class="article text-slate-700 dark:text-slate-300 text-[1.02rem]">${sanitize(p.content_html)}</div>`;
    })();

    function errBlock(msg) {
      return `<div class="text-center py-20">
        <div class="text-4xl mb-3">🚧</div>
        <p class="font-semibold text-slate-700 dark:text-slate-300">${msg}</p>
        <a href="blog.html" class="inline-block mt-4 text-sm font-semibold text-indigo-600 dark:text-indigo-400">← Back to the blog</a>
      </div>`;
    }
  </script>
</body>
</html>
