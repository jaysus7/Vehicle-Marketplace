<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Update Password Credentials</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 h-screen flex items-center justify-center font-sans">
  <div class="bg-slate-800 p-8 rounded-lg border border-slate-700 shadow-xl w-full max-w-md mx-4">
    <h2 class="text-xl font-bold mb-4">Set New Password</h2>
    <div id="msg" class="hidden mb-4 p-3 rounded text-xs"></div>
    <form id="reset-form" class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase text-slate-400 mb-1">New Secure Password</label>
        <input type="password" id="pass" required class="w-full bg-slate-950 border border-slate-700 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-2 rounded text-sm transition">Apply Security Modifications</button>
    </form>
  </div>
  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token'); // Typically passed via recovery redirection links
      
      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ password: document.getElementById('pass').value })
        });
        msg.textContent = 'Password security adjustments successfully updated.';
        msg.className = "mb-4 p-3 bg-emerald-900/50 border border-emerald-700 text-emerald-200 text-xs rounded";
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        msg.textContent = 'Session key variation invalid.';
        msg.className = "mb-4 p-3 bg-red-900/50 border border-red-700 text-red-200 text-xs rounded";
      }
    });
  </script>
</body>
</html>
