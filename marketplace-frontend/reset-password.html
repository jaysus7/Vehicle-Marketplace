<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <title>Reset Password · MarketSync</title>
  <style id="word-break-mobile-css">@media (max-width: 640px) { body { word-wrap: break-word; overflow-wrap: anywhere; } code { white-space: pre-wrap; word-break: break-all; } }</style>
  <script>tailwind = { config: { darkMode: 'media' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <meta name="color-scheme" content="light dark">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 h-screen flex items-center justify-center font-sans overflow-x-hidden">
  <div class="bg-white dark:bg-slate-900 p-8 rounded-lg border border-slate-200 dark:border-slate-800 shadow-xl w-full max-w-md mx-4">
    <div class="text-center mb-6">
      <a href="index.html" class="inline-flex items-center gap-2.5">
        <span class="w-1.5 h-6 bg-indigo-500 rounded-sm"></span>
        <span class="text-2xl font-black tracking-tight text-slate-900 dark:text-white">Market<span class="text-indigo-600 dark:text-indigo-400">Sync</span></span>
      </a>
    </div>
    <h2 class="text-lg font-bold mb-1 text-center text-slate-900 dark:text-white">Set a new password</h2>
    <p class="text-xs text-slate-500 dark:text-slate-400 text-center mb-6">Choose a password you'll remember.</p>
    <div id="msg" class="hidden mb-4 p-3 rounded text-xs"></div>
    <form id="reset-form" class="space-y-4">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-1">New Password</label>
        <input type="password" id="pass" required minlength="8" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded px-3 py-2 text-sm text-slate-900 dark:text-white focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded text-sm transition">Update password</button>
    </form>
  </div>
  <script>
    const API = 'https://vehicle-marketplace-s0e4.onrender.com';
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');

      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ password: document.getElementById('pass').value })
        });
        msg.textContent = 'Password security adjustments successfully updated.';
        msg.className = 'mb-4 p-3 bg-emerald-100 dark:bg-emerald-900/50 border border-emerald-300 dark:border-emerald-700 text-emerald-700 dark:text-emerald-200 text-xs rounded';
        msg.classList.remove('hidden');
        setTimeout(() => window.location.href = 'login.html', 2000);
      } catch (err) {
        msg.textContent = 'Session key variation invalid.';
        msg.className = 'mb-4 p-3 bg-red-100 dark:bg-red-900/50 border border-red-300 dark:border-red-700 text-red-700 dark:text-red-200 text-xs rounded';
        msg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
