<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--brand:#1e3a8a;--brand2:#0f172a}
    .brand-bg{background:var(--brand)} .brand-text{color:var(--brand)} .brand2-bg{background:var(--brand2)} .brand-border{border-color:var(--brand)}
    /* Never let anything push the page wider than the phone screen (kills the sliver
       of horizontal scroll). `clip` (not `hidden`) so the sticky header still works. */
    html,body{max-width:100%;overflow-x:clip}
    body{-webkit-font-smoothing:antialiased}
    /* Let form fields shrink inside flex/grid rows instead of forcing the row wider
       than the viewport (was cropping whole sections on small phones). */
    input,select,textarea{min-width:0;max-width:100%}
    img{max-width:100%}
    .cshadow{box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04)}
  </style>
</head>
<body class="bg-slate-50 text-slate-900">
  <div id="app"><div class="min-h-screen flex items-center justify-center text-slate-400 text-sm">Loading…</div></div>

  <script>
    const API='https://vehicle-marketplace-s0e4.onrender.com';
    const slug=(new URLSearchParams(location.search).get('d')||location.pathname.split('/').filter(Boolean).pop()||'').toLowerCase();
    const esc=(s)=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const attr=(s)=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    const money=(n)=>n?'$'+Number(n).toLocaleString():'Call for price';
    const km=(n)=>n?Number(n).toLocaleString()+' km':'—';
    // Legal: advertised price must state it's plus tax + licensing. Tax name depends on
    // the dealer's province/state (HST/GST/PST/QST in Canada; "sales tax" in the US).
    function taxLabel(){
      const p=(DATA&&DATA.site&&DATA.site.province||'').trim().toLowerCase();
      const HST=['on','ontario','nb','new brunswick','nl','newfoundland','newfoundland and labrador','ns','nova scotia','pe','pei','prince edward island'];
      const PST=['bc','british columbia','mb','manitoba','sk','saskatchewan'];
      const QST=['qc','quebec','québec'];
      const GST=['ab','alberta','nt','northwest territories','nu','nunavut','yt','yukon'];
      if(HST.includes(p)) return 'HST';
      if(QST.includes(p)) return 'GST + QST';
      if(PST.includes(p)) return 'GST + PST';
      if(GST.includes(p)) return 'GST';
      return p?'sales tax':'applicable tax';
    }
    // Small "+ tax & licensing" note shown under every advertised price.
    const priceNote=(v,cls)=>v&&v.price?`<div class="${cls||'text-[10px] text-slate-400 mt-0.5'}">+ ${taxLabel()} &amp; licensing</div>`:'';
    let DATA=null, FILTERED=[], FILTERS={q:'',condition:'',body:'',sort:'newest'}, VIEW='home';

    async function boot(){
      if(!slug){ document.getElementById('app').innerHTML=errPage('No dealership specified.'); return; }
      try{
        const r=await fetch(`${API}/site/${encodeURIComponent(slug)}`);
        if(!r.ok) throw new Error('This site isn\'t available.');
        DATA=await r.json(); const s=DATA.site;
        applySeo(s);
        document.documentElement.style.setProperty('--brand',s.primary_color||'#1e3a8a');
        document.documentElement.style.setProperty('--brand2',s.secondary_color||'#0f172a');
        injectHead(s.head_html);
        applyTypography(s.typography);
        renderChrome(); go('home');
      }catch(e){ document.getElementById('app').innerHTML=errPage(e.message); }
    }
    const errPage=(m)=>`<div class="min-h-screen flex flex-col items-center justify-center gap-2 text-center px-6"><div class="text-lg font-bold text-slate-700">${esc(m)}</div><div class="text-sm text-slate-400">Please check the link.</div></div>`;
    // SEO: set the page title + meta description + Open Graph tags from dealer settings.
    function applySeo(s){
      const title=s.seo_title||`${s.name||'Inventory'}${s.city?' | '+s.city:''}`;
      const desc=s.seo_description||s.about||`Browse inventory, build your vehicle, and get financing at ${s.name||'our dealership'}.`;
      document.title=title;
      const meta=(sel,attr,val)=>{ if(!val) return; let el=document.head.querySelector(sel); if(!el){ el=document.createElement('meta'); const [k,v]=attr; el.setAttribute(k,v); document.head.appendChild(el);} el.setAttribute('content',val); };
      meta('meta[name="description"]',['name','description'],desc);
      if(s.seo_keywords) meta('meta[name="keywords"]',['name','keywords'],s.seo_keywords);
      meta('meta[property="og:title"]',['property','og:title'],title);
      meta('meta[property="og:description"]',['property','og:description'],desc);
      meta('meta[property="og:type"]',['property','og:type'],'website');
      if(s.seo_image||s.hero_url||s.logo_url) meta('meta[property="og:image"]',['property','og:image'],s.seo_image||s.hero_url||s.logo_url);
      meta('meta[name="twitter:card"]',['name','twitter:card'],'summary_large_image');
    }
    function injectHead(html){ if(!html) return; try{ const t=document.createElement('div'); t.innerHTML=html; Array.from(t.childNodes).forEach(n=>{ if(n.nodeType===1&&n.tagName==='SCRIPT'){ const s=document.createElement('script'); for(const a of n.attributes) s.setAttribute(a.name,a.value); s.textContent=n.textContent; document.head.appendChild(s);} else if(n.nodeType===1) document.head.appendChild(n); }); }catch(e){} }
    // Typography theme → one selector changes every heading/body font site-wide.
    function applyTypography(theme){
      const T={ modern:{h:'Inter',b:'Inter',u:'Inter:wght@400;600;800'},
        luxury:{h:'Playfair Display',b:'Inter',u:'Playfair+Display:wght@600;800|Inter:wght@400;600'},
        bold:{h:'Oswald',b:'Inter',u:'Oswald:wght@600;700|Inter:wght@400;600'},
        corporate:{h:'Roboto Slab',b:'Inter',u:'Roboto+Slab:wght@600;800|Inter:wght@400;600'},
        minimal:{h:'Inter',b:'Inter',u:'Inter:wght@300;500;700'} };
      const t=T[theme]||T.modern;
      const link=document.createElement('link'); link.rel='stylesheet'; link.href=`https://fonts.googleapis.com/css2?family=${t.u}&display=swap`; document.head.appendChild(link);
      const st=document.createElement('style'); st.textContent=`body{font-family:'${t.b}',system-ui,sans-serif}h1,h2,h3,.font-black,.font-bold{font-family:'${t.h}',system-ui,sans-serif}`; document.head.appendChild(st);
    }
    // Rendered-car placeholder when a unit has no photo — the car on the dealer's
    // chosen background (or a brand gradient). Never a broken/empty tile.
    function carPlaceholder(cls){
      const bg=DATA.site.photo_background_url;
      const style=bg?`background-image:url('${esc(bg)}');background-size:cover;background-position:center`:'background:linear-gradient(135deg,var(--brand),var(--brand2))';
      return `<div class="${cls} flex items-center justify-center" style="${style}"><svg viewBox="0 0 120 46" class="w-3/4 max-w-[200px]" style="opacity:.95"><path d="M10 34 h100 a3 3 0 0 0 3-3 v-6 a4 4 0 0 0-3-4 l-14-3 -9-9 a7 7 0 0 0-5-2 H43 a7 7 0 0 0-5 2 l-9 9 -14 3 a4 4 0 0 0-3 4 v6 a3 3 0 0 0 3 3 z" fill="#ffffff" fill-opacity=".92"/><circle cx="34" cy="35" r="7" fill="#0f172a"/><circle cx="86" cy="35" r="7" fill="#0f172a"/><circle cx="34" cy="35" r="3" fill="#fff"/><circle cx="86" cy="35" r="3" fill="#fff"/></svg></div>`;
    }
    // Carfax / window sticker / brochure links + open-recall badge — same set the
    // internal inventory cards show. Only renders links the dealer actually has; no
    // decode, and no AI sticker/brochure unless the dealer already generated one.
    function docLinks(v){
      const b='text-[11px] font-bold border border-slate-300 rounded-md px-2 py-1 hover:bg-slate-50 inline-flex items-center gap-1 bg-white';
      const p=[];
      if(v.carfax_url) p.push(`<a href="${esc(v.carfax_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="${b}">CARFAX<span class="text-red-500">🍁</span></a>`);
      if(v.window_sticker_url) p.push(`<a href="${esc(v.window_sticker_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="${b}">Window sticker</a>`);
      if(v.brochure_url) p.push(`<a href="${esc(v.brochure_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="${b}">Brochure</a>`);
      if(v.recall_count) p.push(`<span class="text-[11px] font-bold text-amber-800 bg-amber-100 rounded-md px-2 py-1">⚠ ${v.recall_count} recall${v.recall_count>1?'s':''}</span>`);
      return p.length?`<div class="flex flex-wrap gap-1.5 px-3 pb-3 mt-auto">${p.join('')}</div>`:'';
    }
    // Shared vehicle card + inventory wiring (reused by default home and section grids).
    function vehicleCard(v){ const img=v.image_urls[0]; const specs=[v.mileage?km(v.mileage):null,v.drivetrain,v.fuel_type].filter(Boolean).slice(0,3).join(' · ');
      const badge=v.market_status==='pending'?`<span class="absolute top-2 left-2 text-[10px] font-black uppercase tracking-wide text-white bg-amber-500 rounded px-2 py-0.5">Sale Pending</span>`:v.market_status==='demo'?`<span class="absolute top-2 left-2 text-[10px] font-black uppercase tracking-wide text-white bg-slate-700 rounded px-2 py-0.5">Demo</span>`:'';
      return `<div class="bg-white rounded-xl overflow-hidden cshadow hover:shadow-lg transition flex flex-col"><button onclick="openVehicle('${v.id}')" class="text-left w-full"><div class="relative">${img?`<img src="${esc(img)}" loading="lazy" class="w-full h-48 object-cover bg-slate-100">`:carPlaceholder('w-full h-48')}${badge}</div><div class="p-3"><div class="font-bold truncate">${esc([v.year,v.make,v.model].filter(Boolean).join(' '))}</div><div class="text-xs text-slate-500 truncate">${esc(v.trim||'')}${v.image_urls.length>1?` · ${v.image_urls.length} photos`:''}</div><div class="mt-1.5 flex items-center justify-between"><span class="brand-text font-black">${money(v.price)}</span>${v.condition?`<span class="text-[10px] uppercase font-bold text-slate-400">${esc(v.condition)}</span>`:''}</div>${priceNote(v)}${specs?`<div class="text-xs text-slate-500 mt-1 truncate">${esc(specs)}</div>`:''}</div></button>${docLinks(v)}</div>`; }
    function wireInventory(){ const on=(id,ev,fn)=>{const x=document.getElementById(id); if(x) x.addEventListener(ev,fn);};
      on('q','input',e=>{FILTERS.q=e.target.value;applyFilters();renderGrid();updateCount();});
      on('f-cond','change',e=>{FILTERS.condition=e.target.value;applyFilters();renderGrid();updateCount();});
      on('f-body','change',e=>{FILTERS.body=e.target.value;applyFilters();renderGrid();updateCount();});
      on('f-sort','change',e=>{FILTERS.sort=e.target.value;applyFilters();renderGrid();});
    }

    function widgetBlock(w){ const doc=`<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><style>body{margin:0;font-family:-apple-system,Segoe UI,Arial,sans-serif}</style></head><body>${w.html}</body></html>`; return `<div class="w-full">${w.title?`<h3 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 max-w-6xl mx-auto px-4">${esc(w.title)}</h3>`:''}<iframe srcdoc="${attr(doc)}" style="width:100%;height:${w.height}px;border:0;display:block" sandbox="allow-scripts allow-forms allow-popups allow-same-origin allow-popups-to-escape-sandbox" loading="lazy"></iframe></div>`; }
    const slotHtml=(name)=>{ const ws=(DATA.site.widgets||[]).filter(w=>w.slot===name); return ws.length?`<div class="space-y-4 py-2">${ws.map(widgetBlock).join('')}</div>`:''; };

    // ── Chrome (header + footer stay; #view swaps) ─────────────────────────────
    function renderChrome(){
      const s=DATA.site;
      const addr=[s.address,[s.city,s.province,s.postal_code].filter(Boolean).join(', ')].filter(Boolean).join(', ');
      // Build the nav: simple links + dealer-grouped page dropdowns.
      const navPages=(s.pages||[]).filter(p=>p.nav);
      const grouped={}, topPages=[];
      for(const p of navPages){ if(p.menu){ (grouped[p.menu]=grouped[p.menu]||[]).push(p); } else topPages.push(p); }
      const hasTeam=(s.staff||[]).length||(DATA.team||[]).length;
      const navItems=[
        {label:'Inventory',onclick:"go('inventory')"},
        {label:'Build & Price',onclick:"go('build')"},
        ...Object.keys(grouped).map(m=>({label:m,children:grouped[m].map(p=>({label:p.title,onclick:`go('page:${p.slug}')`}))})),
        ...topPages.map(p=>({label:p.title,onclick:`go('page:${p.slug}')`})),
        {label:'Value Trade',onclick:"go('trade')"},
        {label:'Financing',onclick:"go('finance')"},
        ...(hasTeam?[{label:'Team',onclick:"go('team')"}]:[]),
        {label:'Contact',onclick:"go('inquiry')"},
      ];
      document.getElementById('app').innerHTML=`
        ${slotHtml('top_banner')}
        <header class="brand-bg text-white sticky top-0 z-30">
          <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between gap-2">
            <a href="#" onclick="go('home');return false" class="flex items-center gap-2 min-w-0 flex-1">
              ${s.logo_url?`<img src="${esc(s.logo_url)}" alt="" class="h-9 w-auto bg-white/10 rounded px-1 shrink-0">`:''}
              <span class="font-black text-lg truncate">${esc(s.name)}</span>
            </a>
            <nav class="hidden lg:flex items-center gap-5 text-sm font-semibold shrink-0">
              ${navItems.map(it=> it.children
                ? `<div class="relative group"><button class="hover:opacity-80 flex items-center gap-1">${esc(it.label)}<span class="text-[9px]">▾</span></button><div class="absolute left-0 top-full pt-2 hidden group-hover:block z-40"><div class="bg-white text-slate-800 rounded-lg shadow-xl py-1 min-w-[190px] max-h-[70vh] overflow-y-auto">${it.children.map(c=>`<a href="#" onclick="${c.onclick};return false" class="block px-4 py-2 hover:bg-slate-100 text-sm">${esc(c.label)}</a>`).join('')}</div></div></div>`
                : `<a href="#" onclick="${it.onclick};return false" class="hover:opacity-80">${esc(it.label)}</a>`
              ).join('')}
            </nav>
            <div class="flex items-center gap-2 shrink-0">
              <button onclick="go('finance')" class="hidden sm:inline bg-white text-slate-900 rounded-lg px-3 py-1.5 text-sm font-bold hover:bg-slate-100">Get pre-approved</button>
              ${s.phone?`<a href="tel:${esc(s.phone)}" class="hidden sm:inline bg-white/15 hover:bg-white/25 rounded-lg px-3 py-1.5 text-sm font-bold whitespace-nowrap">${esc(s.phone)}</a>`:''}
              <button onclick="toggleMobileNav()" aria-label="Menu" class="lg:hidden text-white p-2 -mr-2 text-2xl leading-none">☰</button>
            </div>
          </div>
          <div id="mnav" class="lg:hidden hidden border-t border-white/10">
            <nav class="max-w-6xl mx-auto px-4 py-1 flex flex-col text-sm font-semibold">
              ${navItems.map(it=> it.children
                ? `<div class="py-2 border-b border-white/10"><div class="text-[11px] uppercase tracking-wide text-white/60 mb-1">${esc(it.label)}</div>${it.children.map(c=>`<a href="#" onclick="toggleMobileNav();${c.onclick};return false" class="block py-2 pl-3">${esc(c.label)}</a>`).join('')}</div>`
                : `<a href="#" onclick="toggleMobileNav();${it.onclick};return false" class="py-3 border-b border-white/10">${esc(it.label)}</a>`
              ).join('')}
              <div class="flex gap-2 py-3">
                <button onclick="toggleMobileNav();go('finance')" class="flex-1 bg-white text-slate-900 rounded-lg px-3 py-2 font-bold">Get pre-approved</button>
                ${s.phone?`<a href="tel:${esc(s.phone)}" class="flex-1 text-center bg-white/15 rounded-lg px-3 py-2 font-bold">Call ${esc(s.phone)}</a>`:''}
              </div>
            </nav>
          </div>
        </header>
        <div id="view"></div>
        <footer class="bg-slate-900 text-slate-300">
          <div class="max-w-6xl mx-auto px-4 py-8 grid sm:grid-cols-4 gap-6 text-sm">
            <div>
              ${s.logo_url?`<img src="${esc(s.logo_url)}" class="h-8 mb-2">`:`<div class="font-black text-white mb-2">${esc(s.name)}</div>`}
              ${addr?`<div class="text-slate-400">${esc(addr)}</div>`:''}
              ${s.phone?`<div class="text-slate-400 mt-1">${esc(s.phone)}</div>`:''}
              <div class="flex gap-3 mt-3">${s.facebook_url?`<a href="${esc(s.facebook_url)}" target="_blank" class="hover:text-white">Facebook</a>`:''}${s.instagram_url?`<a href="${esc(s.instagram_url)}" target="_blank" class="hover:text-white">Instagram</a>`:''}</div>
            </div>
            <div><div class="font-bold text-white mb-2">Shop</div>
              <a href="#" onclick="setCond('new');return false" class="block text-slate-400 hover:text-white">New vehicles</a>
              <a href="#" onclick="setCond('used');return false" class="block text-slate-400 hover:text-white">Used vehicles</a>
            </div>
            <div><div class="font-bold text-white mb-2">Finance & Trade</div>
              <a href="#" onclick="go('trade');return false" class="block text-slate-400 hover:text-white">Value your trade</a>
              <a href="#" onclick="go('finance');return false" class="block text-slate-400 hover:text-white">Get pre-approved</a>
              <a href="#" onclick="go('inquiry');return false" class="block text-slate-400 hover:text-white">Contact us</a>
            </div>
            <div>${s.hours?`<div class="font-bold text-white mb-2">Hours</div><div class="text-slate-400 whitespace-pre-line">${esc(s.hours)}</div>`:''}</div>
          </div>
          <div class="border-t border-slate-800 text-center text-[11px] text-slate-500 px-4 pt-4">All advertised prices are plus ${taxLabel()} and licensing. Prices do not include applicable taxes, licensing, or fees. Vehicle availability is subject to change.</div>
          <div class="text-center text-xs text-slate-500 py-4">© ${new Date().getFullYear()} ${esc(s.name)} · Powered by MarketSync</div>
        </footer>`;
    }
    function go(view,vehId,prefill){ VIEW=view; window.scrollTo(0,0); renderView();
      if(view==='inquiry'){ setTimeout(()=>{ const vf=document.getElementById('i-vehicle'); if(vehId&&vf) vf.value=vehId; const mf=document.getElementById('i-msg'); if(prefill&&mf) mf.value=prefill; },30); } }
    function renderView(){
      const el=document.getElementById('view'); if(!el) return;
      if(VIEW==='inventory') return void renderInventory(el);
      if(VIEW==='build') return void renderBuild(el);
      if(VIEW==='team') return void(el.innerHTML=viewTeam());
      if(VIEW==='trade') return void(el.innerHTML=viewTrade());
      if(VIEW==='finance') return void(el.innerHTML=viewFinance());
      if(VIEW==='inquiry') return void(el.innerHTML=viewInquiry());
      if(VIEW.startsWith('page:')){ const p=(DATA.site.pages||[]).find(x=>x.slug===VIEW.slice(5)); return void(el.innerHTML=viewPage(p)); }
      renderHome(el);
    }

    // ── HOME ───────────────────────────────────────────────────────────────────
    function renderHome(el){ const secs=DATA.site.sections||[]; if(secs.length) return renderSections(el,secs); renderDefaultHome(el); }
    function renderDefaultHome(el){
      const s=DATA.site; applyFilters();
      const bodies=[...new Set((DATA.vehicles||[]).map(v=>(v.body_style||'').trim()).filter(Boolean))].sort();
      el.innerHTML=`
        <section id="top" class="relative brand2-bg text-white">
          ${s.hero_url?`<img src="${esc(s.hero_url)}" class="absolute inset-0 w-full h-full object-cover opacity-40">`:''}
          <div class="relative max-w-6xl mx-auto px-4 py-16 sm:py-24">
            <h1 class="text-3xl sm:text-5xl font-black max-w-2xl">${esc(s.tagline||'Find your next vehicle')}</h1>
            <p class="mt-3 text-white/80 max-w-xl">${esc(s.about?s.about.slice(0,180):`Browse our ${DATA.count} available vehicle${DATA.count===1?'':'s'}.`)}</p>
            <div class="mt-6 flex flex-wrap gap-3">
              <a href="#" onclick="go('inventory');return false" class="bg-white text-slate-900 font-bold px-5 py-2.5 rounded-lg hover:bg-slate-100">Browse inventory →</a>
              <button onclick="go('trade')" class="border border-white/40 text-white font-bold px-5 py-2.5 rounded-lg hover:bg-white/10">Value your trade</button>
              <button onclick="go('finance')" class="border border-white/40 text-white font-bold px-5 py-2.5 rounded-lg hover:bg-white/10">Get pre-approved</button>
            </div>
          </div>
        </section>
        ${slotHtml('hero_below')}
        <section class="max-w-6xl mx-auto px-4 -mt-6 relative z-10">
          <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            ${[['New Inventory',"setCond('new')"],['Used Inventory',"setCond('used')"],['Value Your Trade',"go('trade')"],['Get Financing',"go('finance')"]].map(t=>`<button onclick="${t[1]}" class="brand-bg text-white rounded-xl p-4 text-left font-bold hover:opacity-90 transition cshadow flex items-center justify-between"><span>${t[0]}</span><span>→</span></button>`).join('')}
          </div>
        </section>
        ${slotHtml('above_inventory')}
        ${homeSearchBlock('Our inventory')}
        ${slotHtml('below_inventory')}
        ${((DATA.site.staff||[]).length||(DATA.team||[]).length)?`<section class="bg-white border-t border-slate-200"><div class="max-w-6xl mx-auto px-4 py-10 text-center"><h2 class="text-2xl font-black mb-2">Meet our team</h2><p class="text-slate-500 mb-4">Sales, service and management — here to help.</p><button onclick="go('team')" class="brand-bg text-white font-bold px-5 py-2.5 rounded-lg">See our team →</button></div></section>`:''}
        <section class="brand-bg text-white"><div class="max-w-6xl mx-auto px-4 py-10 text-center">
          <h2 class="text-2xl font-black">Ready to find your next vehicle?</h2>
          <div class="mt-4 flex flex-wrap justify-center gap-3">
            <button onclick="go('trade')" class="bg-white text-slate-900 font-bold px-5 py-2.5 rounded-lg">Value your trade</button>
            <button onclick="go('finance')" class="border border-white/50 font-bold px-5 py-2.5 rounded-lg hover:bg-white/10">Get pre-approved</button>
            <button onclick="go('inquiry')" class="border border-white/50 font-bold px-5 py-2.5 rounded-lg hover:bg-white/10">Contact us</button>
          </div>
        </div></section>
        ${slotHtml('above_footer')}`;
    }

    // ── Section-based page builder (public render) ─────────────────────────────
    function renderSections(el, secs){
      el.innerHTML = secs.map(sectionHtml).join('');
    }
    function ctaTarget(t,link){ if(t==='link'&&link) return `onclick="window.open('${esc(link)}','_blank')"`; const v={trade:'trade',finance:'finance',contact:'inquiry',inquiry:'inquiry'}[t]||'inquiry'; return `onclick="go('${v}')"`; }
    function sectionHtml(sec){
      const s=DATA.site, g=sec.settings||{};
      switch(sec.type){
        case 'hero': {

          return `<section class="max-w-6xl mx-auto px-4 py-10"><div class="flex items-center justify-between mb-4"><h2 class="text-2xl font-black">${esc(g.title||'Featured vehicles')}</h2><a href="#" onclick="setCond('');return false" class="text-sm font-bold brand-text">View all →</a></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${vs.map(vehicleCard).join('')||'<div class="text-sm text-slate-400">No vehicles yet.</div>'}</div></section>`;

        case 'finance_cta': return ctaBand(g.title||'Get pre-approved today',g.subtitle||'Fast, secure, no impact to your credit score.',g.button_label||'Get pre-approved','finance');

        case 'service_cta': return ctaBand(g.title||'Book your service',g.subtitle||'Factory-trained technicians.',g.button_label||'Book service',g.button_target||'inquiry',g.button_link);
        case 'cta_banner': return ctaBand(g.title||'Ready to get started?','',g.button_label||'Contact us',g.button_target||'inquiry',g.button_link);
        case 'staff': return ((DATA.site.staff||[]).length||(DATA.team||[]).length)?`<section class="bg-white border-t border-slate-200"><div class="max-w-6xl mx-auto px-4 py-10 text-center"><h2 class="text-2xl font-black mb-2">${esc(g.title||'Meet our team')}</h2><p class="text-slate-500 mb-4">Sales, service and management — here to help.</p><button onclick="go('team')" class="brand-bg text-white font-bold px-5 py-2.5 rounded-lg">See our team →</button></div></section>`:'';
        case 'reviews': return `<section class="bg-slate-100"><div class="max-w-6xl mx-auto px-4 py-12"><h2 class="text-2xl font-black mb-4 text-center">${esc(g.title||'What our customers say')}</h2>${g.embed_html?`<div>${g.embed_html}</div>`:'<div class="text-center text-sm text-slate-400">Reviews widget — paste your Google Reviews embed in the section settings.</div>'}</div></section>`;
        case 'faq': { const items=Array.isArray(g.items)?g.items:[]; return `<section class="max-w-3xl mx-auto px-4 py-12"><h2 class="text-2xl font-black mb-6">${esc(g.title||'Frequently asked questions')}</h2><div class="space-y-3">${items.map(it=>`<details class="bg-white rounded-lg cshadow p-4"><summary class="font-bold cursor-pointer">${esc(it.q||'')}</summary><p class="text-sm text-slate-600 mt-2 whitespace-pre-line">${esc(it.a||'')}</p></details>`).join('')||'<div class="text-sm text-slate-400">Add FAQ items in the section settings.</div>'}</div></section>`; }
        case 'gallery': { const imgs=Array.isArray(g.images)?g.images:[]; return imgs.length?`<section class="max-w-6xl mx-auto px-4 py-10">${g.title?`<h2 class="text-2xl font-black mb-4">${esc(g.title)}</h2>`:''}<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2">${imgs.map(u=>`<img src="${esc(u)}" class="w-full h-40 object-cover rounded-lg">`).join('')}</div></section>`:''; }
        case 'map': { const addr=g.address||[s.address,s.city,s.province].filter(Boolean).join(', '); return addr?`<section class="max-w-6xl mx-auto px-4 py-10">${g.title?`<h2 class="text-2xl font-black mb-4">${esc(g.title)}</h2>`:''}<iframe class="w-full h-72 rounded-lg border-0" loading="lazy" src="https://www.google.com/maps?q=${encodeURIComponent(addr)}&output=embed"></iframe></section>`:''; }
        case 'contact': return `<section id="contact" class="brand-bg text-white"><div class="max-w-6xl mx-auto px-4 py-12 grid md:grid-cols-2 gap-8"><div><h2 class="text-2xl font-black mb-3">${esc(g.title||'Get in touch')}</h2>${s.phone?`<div class="text-white/80 text-sm mb-1">📞 <a href="tel:${esc(s.phone)}" class="underline">${esc(s.phone)}</a></div>`:''}${s.email?`<div class="text-white/80 text-sm mb-1">✉️ <a href="mailto:${esc(s.email)}" class="underline">${esc(s.email)}</a></div>`:''}${s.hours?`<div class="text-white/80 text-sm mt-3 whitespace-pre-line">${esc(s.hours)}</div>`:''}</div><form onsubmit="submitInquiry(event)" class="bg-white text-slate-900 rounded-xl p-5 space-y-2"><div class="font-bold">Send us a message</div><input id="i-name" placeholder="Your name" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"><div class="flex gap-2"><input id="i-phone" placeholder="Phone" class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm"><input id="i-email" placeholder="Email" class="flex-1 border border-slate-300 rounded-lg px-3 py-2 text-sm"></div><textarea id="i-msg" rows="3" placeholder="How can we help?" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm"></textarea><input type="hidden" id="i-vehicle"><button class="w-full brand-bg text-white font-bold py-2.5 rounded-lg">Send</button></form></div></section>`;
        case 'html': return `<section class="max-w-6xl mx-auto px-4 py-8"><div class="prose max-w-none">${g.html||''}</div></section>`;
        default: return '';
      }
    }
    function ctaBand(title,sub,label,target,link){ return `<section class="brand-bg text-white"><div class="max-w-6xl mx-auto px-4 py-10 text-center"><h2 class="text-2xl font-black">${esc(title)}</h2>${sub?`<p class="mt-1 text-white/80">${esc(sub)}</p>`:''}<div class="mt-4"><button ${ctaTarget(target,link)} class="bg-white text-slate-900 font-bold px-6 py-2.5 rounded-lg">${esc(label)}</button></div></div></section>`; }
    function applyFilters(){ let v=(DATA.vehicles||[]).slice(); const q=FILTERS.q.toLowerCase();
      if(q) v=v.filter(x=>[x.year,x.make,x.model,x.trim,x.stocknumber].filter(Boolean).join(' ').toLowerCase().includes(q));
      if(FILTERS.condition) v=v.filter(x=>(x.condition||'').toLowerCase()===FILTERS.condition);
      if(FILTERS.body) v=v.filter(x=>(x.body_style||'').toLowerCase()===FILTERS.body);
      const s=FILTERS.sort; v.sort((a,b)=>s==='price-asc'?(a.price||1e12)-(b.price||1e12):s==='price-desc'?(b.price||0)-(a.price||0):s==='miles-asc'?(a.mileage||1e12)-(b.mileage||1e12):0); FILTERED=v; }
    function setCond(c){ invReset(); if(c) INV.facets.condition=new Set([cap(c)]); go('inventory'); }
    const updateCount=()=>{const el=document.getElementById('count'); if(el) el.textContent=`${FILTERED.length} vehicle${FILTERED.length===1?'':'s'}`;};
    function renderGrid(){ const grid=document.getElementById('grid'); if(!grid) return;
      if(!FILTERED.length){ grid.innerHTML='<div class="col-span-full text-center text-sm text-slate-400 py-10">No vehicles match your search.</div>'; return; }
      grid.innerHTML=FILTERED.map(vehicleCard).join('');
    }

    // ── Faceted inventory page (its own view) ──────────────────────────────────
    let INV={ q:'', sort:'newest', facets:{}, limit:24, showFilters:false, collapsed:{}, more:{}, _results:[], _io:null };
    const INV_FACETS=[['status','Status'],['condition','Condition'],['make','Make'],['model','Model'],['body','Body type'],['year','Year'],['price','Price'],['drivetrain','Drivetrain'],['fuel','Fuel']];
    const PRICE_BUCKETS=[['Under $20,000',0,20000],['$20,000 – $30,000',20000,30000],['$30,000 – $40,000',30000,40000],['$40,000 – $50,000',40000,50000],['$50,000 – $70,000',50000,70000],['$70,000+',70000,1e12]];
    const cap=(s)=>s?String(s)[0].toUpperCase()+String(s).slice(1).toLowerCase():'';
    function priceBucket(p){ if(!p) return ''; for(const b of PRICE_BUCKETS){ if(p>=b[1]&&p<b[2]) return b[0]; } return ''; }
    const STATUS_LABEL={available:'In stock',pending:'Sale pending',demo:'Demo'};
    function facetVal(v,f){ switch(f){ case 'status':return STATUS_LABEL[v.market_status]||'In stock'; case 'condition':return cap(v.condition); case 'make':return v.make||''; case 'model':return v.model||''; case 'body':return v.body_style||''; case 'drivetrain':return v.drivetrain||''; case 'fuel':return v.fuel_type||''; case 'year':return v.year?String(v.year):''; case 'price':return priceBucket(v.price); } return ''; }
    function invMatch(v,except){ if(INV.q){ const hay=[v.year,v.make,v.model,v.trim,v.stocknumber,v.body_style].filter(Boolean).join(' ').toLowerCase(); if(!hay.includes(INV.q)) return false; } for(const f in INV.facets){ if(f===except) continue; const set=INV.facets[f]; if(set&&set.size&&!set.has(facetVal(v,f))) return false; } return true; }
    function invResults(){ let v=(DATA.vehicles||[]).filter(x=>invMatch(x,null)); const s=INV.sort; v.sort((a,b)=>s==='price-asc'?(a.price||1e12)-(b.price||1e12):s==='price-desc'?(b.price||0)-(a.price||0):s==='miles-asc'?(a.mileage||1e12)-(b.mileage||1e12):s==='year-desc'?(b.year||0)-(a.year||0):0); return v; }
    function invFacetCounts(f){ const m=new Map(); for(const v of (DATA.vehicles||[])){ if(!invMatch(v,f)) continue; const val=facetVal(v,f); if(!val) continue; m.set(val,(m.get(val)||0)+1); } let e=[...m.entries()]; if(f==='year') e.sort((a,b)=>Number(b[0])-Number(a[0])); else if(f==='price') e.sort((a,b)=>PRICE_BUCKETS.findIndex(x=>x[0]===a[0])-PRICE_BUCKETS.findIndex(x=>x[0]===b[0])); else e.sort((a,b)=>b[1]-a[1]||String(a[0]).localeCompare(String(b[0]))); return e; }
    function invActiveCount(){ let n=INV.q?1:0; for(const f in INV.facets) n+=(INV.facets[f]?.size||0); return n; }
    function renderInventory(el){
      const active=invActiveCount();
      el.innerHTML=`<div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-4 gap-3 flex-wrap">
          <h1 class="text-2xl font-black">Inventory</h1>
          <div class="flex items-center gap-2">
            <button onclick="invToggleFilters()" class="lg:hidden text-sm font-bold border border-slate-300 rounded-lg px-3 py-2">Filters${active?` (${active})`:''}</button>
            <label class="text-sm text-slate-500 hidden sm:block">Sort by</label>
            <select onchange="invSort(this.value)" class="border border-slate-300 rounded-lg px-3 py-2 text-sm">${[['newest','Newest'],['price-asc','Price ↑'],['price-desc','Price ↓'],['miles-asc','Lowest km'],['year-desc','Year']].map(o=>`<option value="${o[0]}" ${INV.sort===o[0]?'selected':''}>${o[1]}</option>`).join('')}</select>
          </div>
        </div>
        <div class="grid lg:grid-cols-[280px_minmax(0,1fr)] gap-6 items-start">
          <aside id="inv-sidebar" class="${INV.showFilters?'':'hidden'} lg:block lg:sticky lg:top-20 lg:max-h-[calc(100vh-6rem)] lg:overflow-y-auto bg-white rounded-xl cshadow p-4">
            <div class="flex items-center justify-between mb-2"><div class="font-black">Search</div><button onclick="invClear()" class="text-xs font-bold brand-text">Clear all</button></div>
            <div class="relative mb-1"><input id="inv-q" value="${esc(INV.q)}" oninput="invSearch(this.value)" placeholder="Make, model, or keyword" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm pr-9"><span class="absolute right-3 top-2.5 text-slate-400">🔍</span></div>
            <div id="inv-facets"></div>
          </aside>
          <div>
            <div id="inv-count" class="text-sm text-slate-500 mb-3"></div>
            <div id="inv-results" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4"></div>
            <div id="inv-sentinel" class="h-10"></div>
          </div>
        </div></div>`;
      const fc=document.getElementById('inv-facets');
      if(fc) fc.addEventListener('change',e=>{ const cb=e.target.closest('input[data-facet]'); if(cb) invToggle(cb.dataset.facet,cb.dataset.value); });
      invRefresh();
    }
    function invFacetHtml(f,label){
      const entries=invFacetCounts(f); const sel=INV.facets[f]||new Set();
      if(!entries.length&&!sel.size) return '';
      const collapsed=!!INV.collapsed[f], showAll=!!INV.more[f], LIMIT=6;
      const shown=collapsed?[]:(showAll?entries:entries.slice(0,LIMIT));
      const rows=shown.map(([val,cnt])=>`<label class="flex items-center gap-2 py-1 cursor-pointer text-sm"><input type="checkbox" data-facet="${f}" data-value="${attr(val)}" ${sel.has(val)?'checked':''} class="w-4 h-4 shrink-0" style="accent-color:var(--brand)"><span class="uppercase text-[13px] tracking-wide flex-1 truncate">${esc(val)}</span><span class="text-slate-400 text-xs">(${cnt})</span></label>`).join('');
      const moreBtn=(!collapsed&&!showAll&&entries.length>LIMIT)?`<button onclick="invMore('${f}')" class="text-sm font-bold brand-text mt-1">+ View more</button>`:'';
      return `<div class="border-t border-slate-100 py-3">
        <button onclick="invCollapse('${f}')" class="w-full flex items-center justify-between font-black text-slate-800"><span>${esc(label)}</span><span class="text-slate-400 text-xs">${collapsed?'▾':'▴'}</span></button>
        ${collapsed?'':`<div class="mt-2">${rows||'<div class="text-xs text-slate-400 italic">None</div>'}${moreBtn}</div>`}</div>`;
    }
    function invRefresh(){
      const fc=document.getElementById('inv-facets'); if(fc) fc.innerHTML=INV_FACETS.map(([f,l])=>invFacetHtml(f,l)).join('');
      INV._results=invResults();
      const cnt=document.getElementById('inv-count'); if(cnt) cnt.textContent=`${INV._results.length} vehicle${INV._results.length===1?'':'s'}`;
      invRenderResults();
    }
    function invRenderResults(){
      const grid=document.getElementById('inv-results'); if(!grid) return;
      const res=INV._results||[];
      if(!res.length){ grid.innerHTML='<div class="col-span-full text-center text-sm text-slate-400 py-16">No vehicles match your filters. <button onclick="invClear()" class="brand-text font-bold">Clear filters</button></div>'; invObserve(false); return; }
      grid.innerHTML=res.slice(0,INV.limit).map(vehicleCard).join('');
      invObserve(res.length>INV.limit);
    }
    function invObserve(hasMore){
      const sent=document.getElementById('inv-sentinel'); if(!sent) return;
      if(INV._io){ INV._io.disconnect(); INV._io=null; }
      if(!hasMore){ sent.innerHTML=''; return; }
      sent.innerHTML='<div class="text-center text-xs text-slate-400 py-4">Loading more…</div>';
      INV._io=new IntersectionObserver(es=>{ if(es[0].isIntersecting){ INV.limit+=24; invRenderResults(); } },{rootMargin:'400px'});
      INV._io.observe(sent);
    }
    function invToggle(f,val){ if(!INV.facets[f]) INV.facets[f]=new Set(); const s=INV.facets[f]; if(s.has(val)) s.delete(val); else s.add(val); if(!s.size) delete INV.facets[f]; INV.limit=24; invRefresh(); }
    function invCollapse(f){ INV.collapsed[f]=!INV.collapsed[f]; invRefresh(); }
    function invMore(f){ INV.more[f]=true; invRefresh(); }
    function invSort(v){ INV.sort=v; INV.limit=24; invRenderResults(); }
    function invSearch(v){ INV.q=String(v||'').toLowerCase(); INV.limit=24; invRefresh(); }
    function invClear(){ INV.q=''; INV.facets={}; INV.more={}; INV.limit=24; const q=document.getElementById('inv-q'); if(q) q.value=''; invRefresh(); }
    function invToggleFilters(){ INV.showFilters=!INV.showFilters; document.getElementById('inv-sidebar')?.classList.toggle('hidden'); }
    // Reset inventory filters to a clean slate (used by home entry points).
    function invReset(){ INV={ q:'', sort:'newest', facets:{}, limit:24, showFilters:false, collapsed:{}, more:{}, _results:[], _io:null }; }
    // Compact "search our inventory" block for the home page → hands off to the page.
    function homeSearchBlock(title){
      const bodies=[...new Set((DATA.vehicles||[]).map(v=>(v.body_style||'').trim()).filter(Boolean))].sort();
      return `<main id="inventory" class="max-w-6xl mx-auto px-4 py-8">
        <h2 class="text-2xl font-black mb-1">${esc(title||'Search our inventory')}</h2>
        <p class="text-sm text-slate-500 mb-4">${DATA.count} vehicle${DATA.count===1?'':'s'} in stock.</p>

          <select id="hcond" class="border border-slate-300 rounded-lg px-3 py-2 text-sm"><option value="">All conditions</option>${['new','used','demo'].map(c=>`<option value="${c}">${cap(c)}</option>`).join('')}</select>
          ${bodies.length?`<select id="hbody" class="border border-slate-300 rounded-lg px-3 py-2 text-sm"><option value="">All types</option>${bodies.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join('')}</select>`:''}
          <button class="brand-bg text-white font-bold px-5 py-2 rounded-lg">Search</button>
          <a href="#" onclick="go('inventory');return false" class="text-sm font-bold brand-text">Browse all →</a>
        </form></main>`;
    }
    function homeSearch(){
      const q=(document.getElementById('hq')?.value||'').trim();
      const cond=document.getElementById('hcond')?.value||'', body=document.getElementById('hbody')?.value||'';
      invReset(); INV.q=q.toLowerCase();
      if(cond) INV.facets.condition=new Set([cap(cond)]);
      if(body) INV.facets.body=new Set([body]);
      go('inventory');
    }
    function openVehicle(id){ const v=(DATA.vehicles||[]).find(x=>x.id===id); if(!v) return;
      const imgs=Array.isArray(v.image_urls)?v.image_urls:[];
      const label=esc([v.year,v.make,v.model].filter(Boolean).join(' '));
      const gallery=imgs.length
        ? `<button onclick="openLightbox('${v.id}',0)" class="block w-full relative"><img src="${esc(imgs[0])}" class="w-full h-72 object-cover rounded-xl bg-slate-100"><span class="absolute bottom-2 right-2 text-[11px] font-bold bg-black/60 text-white rounded-full px-2.5 py-1">⤢ ${imgs.length} photo${imgs.length>1?'s':''}</span></button>${imgs.length>1?`<div class="flex gap-2 mt-2 overflow-x-auto pb-1">${imgs.map((u,i)=>`<button onclick="openLightbox('${v.id}',${i})" class="shrink-0"><img src="${esc(u)}" loading="lazy" class="h-16 w-24 object-cover rounded-lg bg-slate-100"></button>`).join('')}</div>`:''}`
        : carPlaceholder('w-full h-72 rounded-xl');

    function buildSet(k,v){ BUILD[k]=v; if(k==='make'){ BUILD.model='';BUILD.trim='';BUILD.ext='';BUILD.int=''; } if(k==='model'){ BUILD.trim='';BUILD.ext='';BUILD.int=''; } renderBuildBody(); }
    function submitBuild(e){ e.preventDefault(); const btn=e.target.querySelector('button'); const V=(id)=>(document.getElementById(id)?.value||'').trim();
      if(!V('b-name')&&!V('b-phone')&&!V('b-email')){ alert('Add a name, phone, or email.'); return; }
      postLead({form_type:'build',name:V('b-name'),phone:V('b-phone'),email:V('b-email'),message:V('b-notes'),
        fields:{Make:BUILD.make,Model:BUILD.model,Trim:BUILD.trim,Exterior:BUILD.ext,Interior:BUILD.int}},e.target,btn); }

    function viewPage(p){
      if(!p) return `<section class="max-w-3xl mx-auto px-4 py-16 text-center text-slate-400">Page not found.</section>`;
      if(p.make&&p.model){
        const vs=(DATA.vehicles||[]).filter(v=>(v.make||'').toLowerCase()===p.make.toLowerCase()&&(v.model||'').toLowerCase()===p.model.toLowerCase());
        return `<section class="brand2-bg text-white"><div class="max-w-6xl mx-auto px-4 py-14"><h1 class="text-4xl font-black">${esc(p.title)}</h1>${p.body_html?`<div class="mt-3 text-white/80 max-w-2xl">${p.body_html}</div>`:''}<div class="mt-5 flex flex-wrap gap-3"><button onclick="go('trade')" class="bg-white text-slate-900 font-bold px-5 py-2.5 rounded-lg">Value your trade</button><button onclick="go('finance')" class="border border-white/40 font-bold px-5 py-2.5 rounded-lg hover:bg-white/10">Get pre-approved</button></div></div></section>
          <section class="max-w-6xl mx-auto px-4 py-8"><h2 class="text-2xl font-black mb-4">${esc(p.make)} ${esc(p.model)} in stock</h2><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${vs.map(vehicleCard).join('')||`<div class="col-span-full text-slate-400">None in stock right now — <button onclick="go('inquiry')" class="brand-text font-bold">contact us</button> and we'll find you one.</div>`}</div></section>`;
      }
      return `<section class="max-w-3xl mx-auto px-4 py-10"><h1 class="text-3xl font-black mb-4">${esc(p.title)}</h1><div class="prose max-w-none text-slate-700">${p.body_html||''}</div></section>`;
    }

    async function postLead(body,formEl,btn){ btn.disabled=true; const t=btn.textContent; btn.textContent='Sending…';
      try{ const r=await fetch(`${API}/site/${encodeURIComponent(slug)}/lead`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if(!r.ok) throw new Error('x');
        formEl.innerHTML='<div class="text-center py-10"><div class="text-2xl mb-2">✓</div><div class="font-bold text-emerald-600">Thanks! We\'ll be in touch shortly.</div></div>';
      }catch(e){ btn.disabled=false; btn.textContent=t; alert('Sorry, something went wrong. Please call us.'); } }
    const V=(id)=>(document.getElementById(id)?.value||'').trim();
    function submitTrade(e){ e.preventDefault(); const btn=e.target.querySelector('button');
      if(!V('t-name')&&!V('t-phone')&&!V('t-email')){alert('Add a name, phone, or email.');return;}
      postLead({form_type:'trade',name:V('t-name'),phone:V('t-phone'),email:V('t-email'),message:V('t-notes'),fields:{Vehicle:[V('t-year'),V('t-make'),V('t-model'),V('t-trim')].filter(Boolean).join(' '),Mileage:V('t-km'),VIN:V('t-vin'),Condition:V('t-cond')}},e.target,btn); }
    function submitFinance(e){ e.preventDefault(); const btn=e.target.querySelector('button');
      if(!document.getElementById('c-consent')?.checked){alert('Please consent to be contacted.');return;}
      if(!V('c-name')&&!V('c-phone')&&!V('c-email')){alert('Add a name, phone, or email.');return;}
      postLead({form_type:'credit',name:V('c-name'),phone:V('c-phone'),email:V('c-email'),fields:{Address:V('c-address'),Employer:V('c-employer'),'Job title':V('c-job'),'Monthly income':V('c-income'),'Vehicle of interest':V('c-vehicle')}},e.target,btn); }
    function submitInquiry(e){ e.preventDefault(); const btn=e.target.querySelector('button');
      if(!V('i-name')&&!V('i-phone')&&!V('i-email')){alert('Add a name, phone, or email.');return;}
      postLead({form_type:'inquiry',name:V('i-name'),phone:V('i-phone'),email:V('i-email'),message:V('i-msg'),vehicle_id:V('i-vehicle')||null},e.target,btn); }

    function toggleMobileNav(){ const m=document.getElementById('mnav'); if(m) m.classList.toggle('hidden'); }
    window.go=go; window.setCond=setCond; window.openVehicle=openVehicle; window.toggleMobileNav=toggleMobileNav;
    window.openLightbox=openLightbox; window.lbNext=lbNext; window.closeLightbox=closeLightbox;
    Object.assign(window,{ invToggle, invCollapse, invMore, invSort, invSearch, invClear, invToggleFilters, homeSearch, buildSet, submitBuild });
    window.submitTrade=submitTrade; window.submitFinance=submitFinance; window.submitInquiry=submitInquiry;
    boot();
  </script>
</body>
</html>
